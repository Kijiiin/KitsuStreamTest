<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right { 
    display: flex; 
    gap: 6px; 
    align-items: center; 
    flex-wrap: nowrap;
}
.topbar-center { 
    flex: 1; 
    text-align: center; 
    min-width: 0;
}

h1 {
    margin: 0;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
}

.back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 5px 10px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s ease;
    white-space: nowrap;
}

.actors-nav-btn { background: rgba(236, 72, 153, 0.9); }
.login-btn { background: rgba(16, 185, 129, 0.9); }
.logout-btn { background: rgba(239, 68, 68, 0.9); }

.user-info { 
    font-size: 11px; 
    background: rgba(0,0,0,0.5); 
    padding: 4px 10px; 
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}
.username { font-weight: bold; color: #c084fc; }

/* Modale */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e1b4b;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    width: 90%;
    text-align: center;
}

.modal-content input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d2a5e;
    color: white;
}

.modal-content button { margin: 5px; padding: 10px 20px; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 10px; }
.success-msg { color: #4ade80; font-size: 12px; margin-top: 10px; }

.container { max-width: 1200px; margin: auto; padding: 16px; }

/* Sezione ricerca attori */
.actor-search-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    z-index: 10;
}

.actor-search-title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #c084fc;
}

.actor-search-box {
    display: flex;
    gap: 10px;
    max-width: 500px;
    margin: 15px auto;
    position: relative;
}

.actor-search-box input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 30px;
    border: none;
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 14px;
}

.actor-search-box input::placeholder {
    color: rgba(255,255,255,0.5);
}

.actor-search-box input:focus {
    outline: none;
    border: 1px solid #7c3aed;
    background: rgba(0,0,0,0.7);
}

.actor-search-btn {
    background: #7c3aed;
    border: none;
    padding: 12px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

.actor-search-btn:hover {
    background: #6d28d9;
}

/* Suggerimenti autocomplete */
.suggestions-container {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(31, 27, 58, 0.95);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    margin-top: 5px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 1000;
    border: 1px solid rgba(124, 58, 237, 0.5);
    display: none;
}

.suggestions-container.show {
    display: block;
}

.suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-bottom: 1px solid rgba(124, 58, 237, 0.2);
}

.suggestion-item:hover {
    background: rgba(124, 58, 237, 0.3);
}

.suggestion-photo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
}

.suggestion-info {
    flex: 1;
    text-align: left;
}

.suggestion-name {
    font-weight: bold;
    font-size: 14px;
    color: #c084fc;
}

.suggestion-known {
    font-size: 11px;
    color: #aaa;
}

.suggestion-year {
    font-size: 11px;
    color: #ffd700;
}

/* Profilo attore */
.actor-profile {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.actor-photo {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #c084fc;
}

.actor-name {
    font-size: 24px;
    font-weight: bold;
    color: #c084fc;
}

.actor-bio {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    max-width: 600px;
}

.actor-stats {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.actor-stat {
    text-align: center;
}

.actor-stat-value {
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
}

.actor-stat-label {
    font-size: 11px;
    color: #aaa;
}

/* TABS per Ruoli (Recitazione/Regia) */
.role-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0 10px 0;
    border-bottom: 1px solid rgba(124, 58, 237, 0.3);
    padding-bottom: 0;
}

.role-tab-btn {
    background: transparent;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 600;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    border-radius: 0;
}

.role-tab-btn.active {
    color: #c084fc;
}

.role-tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #a855f7, #7c3aed);
    border-radius: 3px;
}

.role-tab-btn:hover:not(.active) {
    color: #c084fc;
    background: rgba(124, 58, 237, 0.1);
}

/* TABS per Media (Film/Serie TV) */
.media-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0 0 0;
    border-bottom: 1px solid rgba(124, 58, 237, 0.2);
}

.media-tab-btn {
    background: transparent;
    border: none;
    padding: 10px 25px;
    font-size: 14px;
    font-weight: 500;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    border-radius: 0;
}

.media-tab-btn.active {
    color: #c084fc;
}

.media-tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, #a855f7, #7c3aed);
    border-radius: 2px;
}

.media-tab-btn:hover:not(.active) {
    color: #c084fc;
    background: rgba(124, 58, 237, 0.05);
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* Selettori di ordinamento */
.sort-selectors {
    background: rgba(31, 27, 58, 0.4);
    border-radius: 16px;
    padding: 15px;
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.sort-group {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 40px;
}

.sort-group label {
    font-size: 13px;
    color: #c084fc;
    font-weight: 500;
}

.sort-group select {
    background: rgba(124, 58, 237, 0.5);
    border: 1px solid #7c3aed;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.sort-group select:hover {
    background: #7c3aed;
}

/* Sezioni contenuti */
.media-section {
    margin-top: 10px;
}

.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 20px;
    padding-bottom: 10px;
}

.section-title {
    font-size: 18px;
    color: #c084fc;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-count {
    background: rgba(124, 58, 237, 0.5);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 14px;
}

.pagination-controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

.pagination-btn {
    background: rgba(124, 58, 237, 0.8);
    border: none;
    padding: 6px 14px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
}

.pagination-btn:hover:not(:disabled) {
    background: #7c3aed;
    transform: scale(1.02);
}

.pagination-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.page-info {
    font-size: 13px;
    color: #c084fc;
}

.items-per-page {
    background: rgba(124, 58, 237, 0.5);
    border: 1px solid #7c3aed;
    padding: 6px 10px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    background: rgba(31, 27, 58, 0.6);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
    cursor: pointer;
}
.card:active { transform: scale(0.98); }
.card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
}
.card-content { padding: 8px; }
.card h4 {
    margin: 0 0 3px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.card p { font-size: 9px; color: #c084fc; margin-bottom: 3px; }
.card .year { font-size: 9px; color: #aaa; }
.card .character { 
    font-size: 9px; 
    color: #ffd700;
    margin-top: 5px;
    font-style: italic;
}
.card .job {
    font-size: 9px;
    color: #4ade80;
    margin-top: 5px;
}

.loading, .no-results {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #c084fc;
}

/* Desktop */
@media (min-width: 769px) {
    .topbar { padding: 20px 30px; }
    h1 { font-size: 28px; }
    .back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn { 
        padding: 10px 20px; 
        font-size: 14px; 
    }
    .user-info { font-size: 14px; padding: 6px 15px; }
    .container { padding: 30px; margin: 40px auto; }
    .actor-profile { flex-direction: row; align-items: center; text-align: left; gap: 30px; }
    .actor-photo { width: 180px; height: 180px; }
    .actor-name { font-size: 28px; }
    .role-tab-btn { padding: 15px 40px; font-size: 18px; }
    .media-tab-btn { padding: 12px 30px; font-size: 15px; }
    .grid { grid-template-columns: repeat(5, 1fr); gap: 25px; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

    .card h4 { font-size: 14px; }
    .card p, .card .year, .card .character, .card .job { font-size: 11px; }
    .section-title { font-size: 20px; }
}

@media (min-width: 769px) and (max-width: 1024px) { 
    .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } 
}
@media (min-width: 1400px) { 
    .grid { grid-template-columns: repeat(6, 1fr); gap: 25px; } 
}

.suggestions-container::-webkit-scrollbar {
    width: 5px;
}
.suggestions-container::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}
.suggestions-container::-webkit-scrollbar-thumb {
    background: #7c3aed;
    border-radius: 10px;
}
.bio-full {
    transition: all 0.3s ease;
}
.bio-toggle-btn:hover {
    background: rgba(124, 58, 237, 0.8) !important;
    transform: scale(1.02);
}
</style>

<div class="topbar">
    <div class="topbar-left">
    </div>
    <div class="topbar-center">
        <h1 onclick="goHome()" style="cursor: pointer;">🎬 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">❤️</button>

</div>

<div class="container">
    <div class="actor-search-section">
        <h2 class="actor-search-title">🎭 Cerca un Attore/Regista</h2>

<!-- Modale Login -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginPanel">
            <h2>🔐 Accedi</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Accedi</button>
            <button class="login-btn" onclick="showRegisterPanel()">Registrati</button>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="registerPanel" style="display:none;">
            <h2>📝 Registrati</h2>
            <input type="text" id="regUsername" placeholder="Nome utente" autocomplete="off">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password (min 6)">
            <button onclick="register()">Registrati</button>
            <button onclick="showLoginPanel()">Torna al Login</button>
            <div id="regError" class="error-msg"></div>
            <div id="regSuccess" class="success-msg"></div>
        </div>
    </div>
</div>

<script type="module">
    // Configurazione Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCeM7KVc9lZsdd8HM5b-PAfhx0usN8Aubo",
        authDomain: "kitsustream-454e8.firebaseapp.com",
        projectId: "kitsustream-454e8",
        storageBucket: "kitsustream-454e8.firebasestorage.app",
        messagingSenderId: "1008216243036",
        appId: "1:1008216243036:web:73dfb15639862757b0df99"
    };

    import { initializeApp } from 'firebase/app';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, getDoc } from 'firebase/firestore';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUsername = "";

    // Funzioni di autenticazione
    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        try {
            await signInWithEmailAndPassword(auth, email, password);
            document.getElementById('authModal').style.display = 'none';
            errorDiv.textContent = '';
        } catch (error) {
            let msg = error.code === 'auth/invalid-email' ? 'Email non valida' :
                      error.code === 'auth/user-not-found' ? 'Utente non trovato' :
                      error.code === 'auth/wrong-password' ? 'Password errata' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.register = async function() {
        const username = document.getElementById('regUsername')?.value?.trim() || "";
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const errorDiv = document.getElementById('regError');
        const successDiv = document.getElementById('regSuccess');
        
        if (!username) {
            errorDiv.textContent = 'Inserisci un nome utente';
            return;
        }
        
        if (username.length < 3) {
            errorDiv.textContent = 'Il nome utente deve avere almeno 3 caratteri';
            return;
        }
        
        if (password.length < 6) {
            errorDiv.textContent = 'La password deve essere almeno di 6 caratteri';
            return;
        }
        
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            
            await setDoc(doc(db, 'users', userCredential.user.uid), { 
                list: [],
                username: username,
                email: email,
                createdAt: new Date()
            });
            
            successDiv.textContent = '✅ Registrazione completata! Ora puoi accedere.';
            setTimeout(() => window.showLoginPanel(), 2000);
        } catch (error) {
            let msg = error.code === 'auth/email-already-in-use' ? 'Email già registrata' :
                      error.code === 'auth/invalid-email' ? 'Email non valida' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.logout = async function() {
        await signOut(auth);
        window.location.reload();
    };

    window.showLoginPanel = function() {
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('registerPanel').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    };

    window.showRegisterPanel = function() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('registerPanel').style.display = 'block';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    };

    window.openLoginModal = function() {
        window.showLoginPanel();
        document.getElementById('authModal').style.display = 'flex';
    };

    async function loadUserData() {
        if (!currentUser) return null;
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        return userDoc.exists() ? userDoc.data() : null;
    }

    // Aggiorna UI auth
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const authButtons = document.getElementById('authButtons');
        
        if (user) {
            const userData = await loadUserData();
            const displayName = userData?.username || user.email.split('@')[0];
            
            authButtons.innerHTML = `
                <div class="user-info">
                    <span>👤</span>
                    <span class="username">${escapeHtml(displayName)}</span>
                    <button class="logout-btn" onclick="window.logout()" style="padding: 4px 10px;">🚪</button>
                </div>
            `;
        } else {
            authButtons.innerHTML = `<button class="login-btn" onclick="window.openLoginModal()">🔐 Accedi</button>`;
        }
    });

    function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }
</script>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

let currentPerson = null;
let actingMovies = [];
let actingTvShows = [];
let directingMovies = [];
let directingTvShows = [];

let currentPage = 1;
let itemsPerPage = 20;
let currentSortBy = "popularity";
let currentRoleTab = "acting";
let currentMediaTab = "movies";

let searchTimeout = null;

function getPersonFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('person') || params.get('actor');
}

window.onload = function() {
    const input = document.getElementById("actorSearchInput");
    
    input.addEventListener("input", handleInputChange);
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") searchFromInput();
    });
    
    document.addEventListener("click", function(e) {
        const container = document.getElementById("suggestions");
        const searchBox = document.querySelector(".actor-search-box");
        if (!searchBox.contains(e.target)) {
            container.classList.remove("show");
        }
    });
    
    const personName = getPersonFromURL();
    if (personName) {
        input.value = decodeURIComponent(personName);
        searchPersonByName(decodeURIComponent(personName));
    }
};

async function handleInputChange(e) {
    const query = e.target.value.trim();
    
    if (searchTimeout) clearTimeout(searchTimeout);
    
    if (query.length < 2) {
        document.getElementById("suggestions").classList.remove("show");
        return;
    }
    
    searchTimeout = setTimeout(async () => {
        await fetchSuggestions(query);
    }, 300);
}

async function fetchSuggestions(query) {
    try {
        const url = `https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=it-IT&page=1`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.results && data.results.length > 0) {
            displaySuggestions(data.results.slice(0, 8));
        } else {
            document.getElementById("suggestions").classList.remove("show");
        }
    } catch (error) {
        console.error("Errore suggerimenti:", error);
    }
}

function displaySuggestions(suggestions) {
    const container = document.getElementById("suggestions");
    
    container.innerHTML = suggestions.map(person => {
        const photoUrl = person.profile_path ? `https://image.tmdb.org/t/p/w92${person.profile_path}` : "https://via.placeholder.com/40x40?text=No+Photo";
        const birthYear = person.birthday ? person.birthday.split("-")[0] : "";
        const knownFor = person.known_for_department || "Artista";
        
        return `
            <div class="suggestion-item" onclick="searchPersonById(${person.id}, '${escapeHtml(person.name).replace(/'/g, "\\'")}')">
                <img class="suggestion-photo" src="${photoUrl}" alt="${person.name}">
                <div class="suggestion-info">
                    <div class="suggestion-name">${escapeHtml(person.name)}</div>
                    <div class="suggestion-known">${knownFor}</div>
                </div>
                ${birthYear ? `<div class="suggestion-year">📅 ${birthYear}</div>` : ''}
            </div>
        `;
    }).join("");
    
    container.classList.add("show");
}

function searchPersonById(personId, personName) {
    document.getElementById("actorSearchInput").value = personName;
    document.getElementById("suggestions").classList.remove("show");
    searchPersonByIdOnly(personId, personName);
}

async function searchPersonByIdOnly(personId, personName) {
    const container = document.getElementById("resultsContainer");
    container.innerHTML = '<div class="loading">⏳ Carico informazioni...</div>';
    
    try {
        const personUrl = `https://api.themoviedb.org/3/person/${personId}?api_key=${API_KEY}&language=it-IT`;
        const personResponse = await fetch(personUrl);
        const personData = await personResponse.json();
        
        const creditsUrl = `https://api.themoviedb.org/3/person/${personId}/combined_credits?api_key=${API_KEY}&language=it-IT`;
        const creditsResponse = await fetch(creditsUrl);
        const creditsData = await creditsResponse.json();
        
        currentPerson = personData;
        
        const allCredits = creditsData.cast || [];
        const allCrew = creditsData.crew || [];
        
        actingMovies = allCredits.filter(item => item.media_type === "movie");
        actingTvShows = allCredits.filter(item => item.media_type === "tv");
        
        const directingCredits = allCrew.filter(item => item.job === "Director");
        directingMovies = directingCredits.filter(item => item.media_type === "movie");
        directingTvShows = directingCredits.filter(item => item.media_type === "tv");
        
        const sortByPopularity = (a, b) => (b.popularity || 0) - (a.popularity || 0);
        actingMovies.sort(sortByPopularity);
        actingTvShows.sort(sortByPopularity);
        directingMovies.sort(sortByPopularity);
        directingTvShows.sort(sortByPopularity);
        
        currentPage = 1;
        currentRoleTab = "acting";
        currentMediaTab = "movies";
        
        displayPersonProfile(personData, actingMovies.length + actingTvShows.length, directingMovies.length + directingTvShows.length);
        displayTabsAndControls();
        displayActingContent();
        
        const newUrl = `${window.location.pathname}?person=${encodeURIComponent(personName)}`;
        window.history.pushState({}, "", newUrl);
        
    } catch (error) {
        console.error("Errore:", error);
        container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
    }
}

function searchPersonByName(personName) {
    const container = document.getElementById("resultsContainer");
    container.innerHTML = '<div class="loading">⏳ Cerco...</div>';
    
    const personUrl = `https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(personName)}&language=it-IT&page=1`;
    fetch(personUrl)
        .then(response => response.json())
        .then(personData => {
            if (!personData.results || personData.results.length === 0) {
                container.innerHTML = '<div class="no-results">😕 Nessun artista trovato con questo nome</div>';
                return;
            }
            const person = personData.results[0];
            searchPersonByIdOnly(person.id, person.name);
        })
        .catch(error => {
            console.error("Errore:", error);
            container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
        });
}

function searchFromInput() {
    const query = document.getElementById("actorSearchInput").value.trim();
    if (!query) {
        alert("Inserisci il nome di un attore o regista");
        return;
    }
    searchPersonByName(query);
}

function sortItems(items, sortType) {
    const sorted = [...items];
    switch(sortType) {
        case "popularity":
            sorted.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
            break;
        case "date_desc":
            const getDate = (item) => {
                const date = item.release_date || item.first_air_date;
                return date ? new Date(date) : new Date(0);
            };
            sorted.sort((a, b) => getDate(b) - getDate(a));
            break;
        case "date_asc":
            const getDateAsc = (item) => {
                const date = item.release_date || item.first_air_date;
                return date ? new Date(date) : new Date(0);
            };
            sorted.sort((a, b) => getDateAsc(a) - getDateAsc(b));
            break;
        case "rating":
            sorted.sort((a, b) => (b.vote_average || 0) - (a.vote_average || 0));
            break;
        case "title":
            const getTitle = (item) => (item.title || item.name || "").toLowerCase();
            sorted.sort((a, b) => getTitle(a).localeCompare(getTitle(b)));
            break;
        default:
            sorted.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
    }
    return sorted;
}

function displayPersonProfile(person, actingCount, directingCount) {
    const container = document.getElementById("resultsContainer");
    const photoUrl = person.profile_path ? `https://image.tmdb.org/t/p/w500${person.profile_path}` : "https://via.placeholder.com/300x300?text=No+Photo";
    const birthYear = person.birthday ? person.birthday.split("-")[0] : "?";
    const deathYear = person.deathday ? ` - ${person.deathday.split("-")[0]}` : "";
    const department = person.known_for_department || "Artista";
    
    // Gestione biografia (tagliata o intera)
    const bioFull = person.biography || "";
    const bioPreview = bioFull.substring(0, 300);
    const hasMore = bioFull.length > 300;
    const bioId = "bio-text-" + Date.now();
    
    const profileHtml = `
        <div class="actor-profile">
            <img class="actor-photo" src="${photoUrl}" alt="${person.name}" loading="lazy">
            <div>
                <h2 class="actor-name">${escapeHtml(person.name)}</h2>
                <div class="actor-stats">
                    <div class="actor-stat">
                        <div class="actor-stat-value">${actingCount}</div>
                        <div class="actor-stat-label">Recitazione</div>
                    </div>
                    <div class="actor-stat">
                        <div class="actor-stat-value">${directingCount}</div>
                        <div class="actor-stat-label">Regia</div>
                    </div>
                    <div class="actor-stat">
                        <div class="actor-stat-value">${person.popularity ? Math.round(person.popularity) : "?"}</div>
                        <div class="actor-stat-label">Popolarità</div>
                    </div>
                </div>
                <div class="actor-bio" style="font-size: 12px;">🎭 ${department}</div>
                ${bioFull ? `
                    <div class="actor-bio" id="${bioId}">
                        ${hasMore ? `<span class="bio-preview">${escapeHtml(bioPreview)}...</span><span class="bio-full" style="display:none;">${escapeHtml(bioFull)}</span>` : escapeHtml(bioFull)}
                    </div>
                    ${hasMore ? `<button class="bio-toggle-btn" onclick="toggleBio('${bioId}')" style="background: rgba(124,58,237,0.5); border: none; padding: 5px 12px; border-radius: 20px; color: white; cursor: pointer; font-size: 11px; margin-top: 8px;">📖 Mostra altro</button>` : ''}
                ` : '<div class="actor-bio">Biografia non disponibile.</div>'}
                <div class="actor-bio" style="font-size: 12px; margin-top: 10px;">📅 ${birthYear}${deathYear} | 🌍 ${person.place_of_birth ? escapeHtml(person.place_of_birth) : "N/D"}</div>
            </div>
        </div>
    `;
    
    container.innerHTML = profileHtml;
}

function toggleBio(bioId) {
    const bioDiv = document.getElementById(bioId);
    if (!bioDiv) return;
    
    const preview = bioDiv.querySelector('.bio-preview');
    const full = bioDiv.querySelector('.bio-full');
    const btn = bioDiv.parentElement.querySelector('.bio-toggle-btn');
    
    if (!preview || !full) return;
    
    if (full.style.display === 'none') {
        // Passa a "Mostra meno"
        preview.style.display = 'none';
        full.style.display = 'inline';
        btn.innerHTML = '📖 Mostra meno';
    } else {
        // Passa a "Mostra altro"
        preview.style.display = 'inline';
        full.style.display = 'none';
        btn.innerHTML = '📖 Mostra altro';
    }
}

function displayDirectingContent() {
    const roleContent = document.getElementById("role-content");
    if (!roleContent) return;
    
    const items = currentMediaTab === 'movies' ? directingMovies : directingTvShows;
    const sortedItems = sortItems(items, currentSortBy);
    const totalPages = Math.ceil(sortedItems.length / itemsPerPage);
    const start = (currentPage - 1) * itemsPerPage;
    const paginatedItems = sortedItems.slice(start, start + itemsPerPage);
    
    const mediaTypeName = currentMediaTab === 'movies' ? 'Film' : 'Serie TV';
    const mediaIcon = currentMediaTab === 'movies' ? '🎬' : '📺';
    
    const contentHtml = `
        <div class="media-tabs">
            <button id="media-movies-btn" class="media-tab-btn ${currentMediaTab === 'movies' ? 'active' : ''}" onclick="switchMediaTab('movies')">🎬 Film Diretti (${directingMovies.length})</button>
            <button id="media-tv-btn" class="media-tab-btn ${currentMediaTab === 'tv' ? 'active' : ''}" onclick="switchMediaTab('tv')">📺 Serie TV Dirette (${directingTvShows.length})</button>
        </div>
        
        <div class="sort-selectors">
            <div class="sort-group">
                <label>📋 Ordina per:</label>
                <select id="sortSelect" onchange="changeSort()">
                    <option value="popularity" ${currentSortBy === "popularity" ? "selected" : ""}>🔥 Più popolari</option>
                    <option value="date_desc" ${currentSortBy === "date_desc" ? "selected" : ""}>📅 Più recenti</option>
                    <option value="date_asc" ${currentSortBy === "date_asc" ? "selected" : ""}>📅 Più vecchi</option>
                    <option value="rating" ${currentSortBy === "rating" ? "selected" : ""}>⭐ Miglior voto</option>
                    <option value="title" ${currentSortBy === "title" ? "selected" : ""}>🔤 Titolo A-Z</option>
                </select>
            </div>
            <div class="sort-group">
                <label>Mostra:</label>
                <select id="itemsPerPage" onchange="changeItemsPerPage()">
                    <option value="12" ${itemsPerPage === 12 ? 'selected' : ''}>12</option>
                    <option value="20" ${itemsPerPage === 20 ? 'selected' : ''}>20</option>
                    <option value="30" ${itemsPerPage === 30 ? 'selected' : ''}>30</option>
                    <option value="50" ${itemsPerPage === 50 ? 'selected' : ''}>50</option>
                </select>
            </div>
        </div>
        
        <div class="media-section">
            <div class="section-header">
                <div class="section-title">
                    ${mediaIcon} ${mediaTypeName} Diretti
                    <span class="section-count">${items.length}</span>
                </div>
            </div>
            ${items.length === 0 ? '<div class="no-results">😕 Nessun ' + mediaTypeName.toLowerCase() + ' diretto trovato</div>' : `
                <div class="grid">
                    ${paginatedItems.map(item => {
                        const title = item.title || item.name;
                        const date = item.release_date || item.first_air_date;
                        const year = date ? date.split("-")[0] : "N/D";
                        const posterUrl = item.poster_path ? IMG_BASE + item.poster_path : "https://via.placeholder.com/500x750?text=No+Poster";
                        return `
                            <div class="card" onclick="openPage(${item.id}, '${currentMediaTab === 'movies' ? 'movie' : 'tv'}')">
                                <img src="${posterUrl}" alt="${title}" loading="lazy">
                                <div class="card-content">
                                    <h4>${escapeHtml(title)}</h4>
                                    <p>⭐ ${item.vote_average ? item.vote_average.toFixed(1) : "N/A"}/10</p>
                                    <p class="year">📅 ${year}</p>
                                    <p class="job">🎬 Regista</p>
                                </div>
                            </div>
                        `;
                    }).join("")}
                </div>
                ${totalPages > 1 ? `
                    <div class="pagination-controls" style="justify-content: center; margin-top: 20px;">
                        <button class="pagination-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>◀ Prec</button>
                        <span class="page-info">Pagina ${currentPage} / ${totalPages}</span>
                        <button class="pagination-btn" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Succ ▶</button>
                    </div>
                ` : ''}
            `}
        </div>
    `;
    
    roleContent.innerHTML = contentHtml;
}

function changePage(direction) {
    let items = [];
    if (currentRoleTab === 'acting') {
        items = currentMediaTab === 'movies' ? actingMovies : actingTvShows;
    } else {
        items = currentMediaTab === 'movies' ? directingMovies : directingTvShows;
    }
    
    const totalPages = Math.ceil(items.length / itemsPerPage);
    const newPage = currentPage + direction;
    
    if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        if (currentRoleTab === 'acting') {
            displayActingContent();
        } else {
            displayDirectingContent();
        }
        window.scrollTo({ top: document.querySelector(".role-tabs").offsetTop - 80, behavior: "smooth" });
    }
}

function openPage(id, type) {
    window.location.href = `${type}.html?id=${id}`;
}

function goHome() { window.location.href = "index.html"; }
function goToList() { window.location.href = "list.html"; }
function goToActors() { window.location.href = "actors.html"; }
function escapeHtml(text) { if (!text) return ""; const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }
