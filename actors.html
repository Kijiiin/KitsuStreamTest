<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KitsuStream - Cerca Troupe & Studi</title>

<link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="manifest" href="favicon_io/site.webmanifest">

<!-- Firebase SDK -->
<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right { 
    display: flex; 
    gap: 6px; 
    align-items: center; 
    flex-wrap: nowrap;
}
.topbar-center { 
    flex: 1; 
    text-align: center; 
    min-width: 0;
}

h1 {
    margin: 0;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
}

.back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn, .studio-nav-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 5px 10px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s ease;
    white-space: nowrap;
}

.actors-nav-btn { background: rgba(236, 72, 153, 0.9); }
.studio-nav-btn { background: rgba(16, 185, 129, 0.9); }
.login-btn { background: rgba(16, 185, 129, 0.9); }
.logout-btn { background: rgba(239, 68, 68, 0.9); }
.list-btn { background: rgba(239, 68, 68, 0.9); }

.user-info { 
    font-size: 11px; 
    background: rgba(0,0,0,0.5); 
    padding: 4px 10px; 
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
}
.username { font-weight: bold; color: #c084fc; }

/* Modale */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e1b4b;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    width: 90%;
    text-align: center;
}

.modal-content input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d2a5e;
    color: white;
}

.modal-content button { margin: 5px; padding: 10px 20px; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 10px; }
.success-msg { color: #4ade80; font-size: 12px; margin-top: 10px; }

.container { max-width: 1200px; margin: auto; padding: 16px; }

/* Tabs ricerca */
.search-tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.search-tab-btn {
    background: rgba(124, 58, 237, 0.4);
    border: 1px solid rgba(124, 58, 237, 0.5);
    padding: 10px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.search-tab-btn.active {
    background: #7c3aed;
    border-color: #7c3aed;
}

/* Sezione ricerca */
.search-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    z-index: 10;
}

.search-title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #c084fc;
}

.search-box {
    display: flex;
    gap: 10px;
    max-width: 500px;
    margin: 15px auto;
    position: relative;
}

.search-box input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 30px;
    border: none;
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 14px;
}

.search-box input::placeholder {
    color: rgba(255,255,255,0.5);
}

.search-box input:focus {
    outline: none;
    border: 1px solid #7c3aed;
    background: rgba(0,0,0,0.7);
}

.search-btn {
    background: #7c3aed;
    border: none;
    padding: 12px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

.search-btn:hover {
    background: #6d28d9;
}

/* Suggerimenti */
.suggestions-container {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(31, 27, 58, 0.95);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    margin-top: 5px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 1000;
    border: 1px solid rgba(124, 58, 237, 0.5);
    display: none;
}

.suggestions-container.show {
    display: block;
}

.suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-bottom: 1px solid rgba(124, 58, 237, 0.2);
}

.suggestion-item:hover {
    background: rgba(124, 58, 237, 0.3);
}

.suggestion-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: rgba(124, 58, 237, 0.3);
}

.suggestion-info {
    flex: 1;
    text-align: left;
}

.suggestion-name {
    font-weight: bold;
    font-size: 14px;
    color: #c084fc;
}

.suggestion-sub {
    font-size: 11px;
    color: #aaa;
}

/* Profilo Attore */
.actor-profile {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.actor-photo {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #c084fc;
}

.actor-name {
    font-size: 24px;
    font-weight: bold;
    color: #c084fc;
    text-align: center;
}

.actor-bio {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    max-width: 600px;
    line-height: 1.5;
}

.actor-stats {
    display: flex;
    gap: 20px;
    margin: 10px 0;
    flex-wrap: wrap;
    justify-content: center;
}

.actor-stat {
    text-align: center;
}

.actor-stat-value {
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
}

.actor-stat-label {
    font-size: 11px;
    color: #aaa;
}

.bio-toggle-btn {
    background: rgba(124, 58, 237, 0.5);
    border: none;
    padding: 6px 15px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    margin-top: 10px;
}

/* Profilo Studio */
.studio-profile {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
}

.studio-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.studio-logo {
    width: 100px;
    height: 100px;
    border-radius: 20px;
    background: rgba(124, 58, 237, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
}

.studio-name {
    font-size: 26px;
    font-weight: bold;
    color: #c084fc;
}

.studio-stats {
    display: flex;
    gap: 20px;
    margin-top: 15px;
    flex-wrap: wrap;
    justify-content: center;
}

.studio-stat {
    text-align: center;
}

.studio-stat-value {
    font-size: 22px;
    font-weight: bold;
    color: #ffd700;
}

.studio-stat-label {
    font-size: 11px;
    color: #aaa;
}

/* TABS per Ruoli */
.role-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0 10px 0;
    border-bottom: 1px solid rgba(124, 58, 237, 0.3);
    padding-bottom: 0;
}

.role-tab-btn {
    background: transparent;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 600;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    border-radius: 0;
}

.role-tab-btn.active {
    color: #c084fc;
}

.role-tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #a855f7, #7c3aed);
    border-radius: 3px;
}

/* TABS Media */
.media-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0 0 0;
    border-bottom: 1px solid rgba(124, 58, 237, 0.2);
}

.media-tab-btn {
    background: transparent;
    border: none;
    padding: 10px 25px;
    font-size: 14px;
    font-weight: 500;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    border-radius: 0;
}

.media-tab-btn.active {
    color: #c084fc;
}

.media-tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, #a855f7, #7c3aed);
    border-radius: 2px;
}

/* Selettori ordinamento */
.sort-selectors {
    background: rgba(31, 27, 58, 0.4);
    border-radius: 16px;
    padding: 15px;
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.sort-group {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 40px;
}

.sort-group label {
    font-size: 13px;
    color: #c084fc;
    font-weight: 500;
}

.sort-group select {
    background: rgba(124, 58, 237, 0.5);
    border: 1px solid #7c3aed;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

/* Griglia card */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    background: rgba(31, 27, 58, 0.6);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: transform 0.2s ease;
    cursor: pointer;
}
.card:active { transform: scale(0.98); }
.card img {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
}
.card-content { padding: 8px; }
.card h4 {
    margin: 0 0 3px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.card p { font-size: 9px; color: #c084fc; margin-bottom: 3px; }
.card .year { font-size: 9px; color: #aaa; }
.card .character { 
    font-size: 9px; 
    color: #ffd700;
    margin-top: 5px;
    font-style: italic;
}
.card .job {
    font-size: 9px;
    color: #4ade80;
    margin-top: 5px;
}

.loading, .no-results {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #c084fc;
}

.pagination-controls {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    margin-top: 20px;
}

.pagination-btn {
    background: rgba(124, 58, 237, 0.8);
    border: none;
    padding: 6px 14px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.pagination-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.page-info {
    font-size: 13px;
    color: #c084fc;
}

/* Desktop */
@media (min-width: 769px) {
    .topbar { padding: 20px 30px; }
    h1 { font-size: 28px; }
    .back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn, .studio-nav-btn { 
        padding: 10px 20px; 
        font-size: 14px; 
    }
    .user-info { font-size: 14px; padding: 6px 15px; }
    .container { padding: 30px; margin: 40px auto; }
    .actor-profile { flex-direction: row; align-items: center; text-align: left; gap: 30px; }
    .actor-photo { width: 180px; height: 180px; }
    .actor-name { font-size: 28px; text-align: left; }
    .actor-bio { text-align: left; }
    .studio-header { flex-direction: row; text-align: left; gap: 30px; }
    .studio-logo { width: 120px; height: 120px; font-size: 60px; }
    .studio-name { font-size: 32px; }
    .role-tab-btn { padding: 15px 40px; font-size: 18px; }
    .media-tab-btn { padding: 12px 30px; font-size: 15px; }
    .grid { grid-template-columns: repeat(5, 1fr); gap: 25px; }
    .card:hover { transform: translateY(-5px); }
    .card-content { padding: 15px; }
    .card h4 { font-size: 14px; }
    .card p, .card .year, .card .character, .card .job { font-size: 11px; }
}

@media (min-width: 769px) and (max-width: 1024px) { 
    .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } 
}
@media (min-width: 1400px) { 
    .grid { grid-template-columns: repeat(6, 1fr); gap: 25px; } 
}

.suggestions-container::-webkit-scrollbar {
    width: 5px;
}
.suggestions-container::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}
.suggestions-container::-webkit-scrollbar-thumb {
    background: #7c3aed;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
    </div>
    <div class="topbar-center">
        <h1 onclick="goHome()" style="cursor: pointer;">🎬 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <div id="authButtons"></div>
        <button class="list-btn" onclick="goToList()" title="La mia lista">❤️</button>
    </div>
</div>

<div class="container">
    <!-- Tabs per tipo di ricerca -->
    <div class="search-tabs">
        <button id="tab-actors" class="search-tab-btn active" onclick="switchSearchTab('actors')">🎭 Attori & Registi</button>
        <button id="tab-studios" class="search-tab-btn" onclick="switchSearchTab('studios')">🏢 Studi & Produzioni</button>
    </div>

    <!-- Sezione ricerca Attori -->
    <div id="actors-section" class="search-section">
        <h2 class="search-title">🎭 Cerca un Attore/Regista</h2>
        <p style="font-size: 13px; color: #aaa;">Inizia a scrivere e scegli un artista dalla lista</p>
        <div class="search-box">
            <input type="text" id="actorSearchInput" placeholder="es. Christopher Nolan, Quentin Tarantino, Martin Scorsese..." autocomplete="off">
            <button class="search-btn" onclick="searchActorFromInput()">🔍 Cerca</button>
            <div id="actorSuggestions" class="suggestions-container"></div>
        </div>
    </div>

    <!-- Sezione ricerca Studi -->
    <div id="studios-section" class="search-section" style="display: none;">
        <h2 class="search-title">🏢 Cerca uno Studio/Casa di Produzione</h2>
        <p style="font-size: 13px; color: #aaa;">Cerca studi come Walt Disney, Pixar, DreamWorks, Studio Ghibli...</p>
        <div class="search-box">
            <input type="text" id="studioSearchInput" placeholder="es. Walt Disney, Pixar, DreamWorks, Studio Ghibli..." autocomplete="off">
            <button class="search-btn" onclick="searchStudioFromInput()">🔍 Cerca</button>
            <div id="studioSuggestions" class="suggestions-container"></div>
        </div>
    </div>

    <div id="resultsContainer"></div>
</div>

<!-- Modale Login -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginPanel">
            <h2>🔐 Accedi</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Accedi</button>
            <button class="login-btn" onclick="showRegisterPanel()">Registrati</button>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="registerPanel" style="display:none;">
            <h2>📝 Registrati</h2>
            <input type="text" id="regUsername" placeholder="Nome utente" autocomplete="off">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password (min 6)">
            <button onclick="register()">Registrati</button>
            <button onclick="showLoginPanel()">Torna al Login</button>
            <div id="regError" class="error-msg"></div>
            <div id="regSuccess" class="success-msg"></div>
        </div>
    </div>
</div>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyCeM7KVc9lZsdd8HM5b-PAfhx0usN8Aubo",
        authDomain: "kitsustream-454e8.firebaseapp.com",
        projectId: "kitsustream-454e8",
        storageBucket: "kitsustream-454e8.firebasestorage.app",
        messagingSenderId: "1008216243036",
        appId: "1:1008216243036:web:73dfb15639862757b0df99"
    };

    import { initializeApp } from 'firebase/app';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, getDoc, setDoc } from 'firebase/firestore';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        try {
            await signInWithEmailAndPassword(auth, email, password);
            document.getElementById('authModal').style.display = 'none';
            errorDiv.textContent = '';
        } catch (error) {
            let msg = error.code === 'auth/invalid-email' ? 'Email non valida' :
                      error.code === 'auth/user-not-found' ? 'Utente non trovato' :
                      error.code === 'auth/wrong-password' ? 'Password errata' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.register = async function() {
        const username = document.getElementById('regUsername')?.value?.trim() || "";
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const errorDiv = document.getElementById('regError');
        const successDiv = document.getElementById('regSuccess');
        
        if (!username) {
            errorDiv.textContent = 'Inserisci un nome utente';
            return;
        }
        
        if (username.length < 3) {
            errorDiv.textContent = 'Il nome utente deve avere almeno 3 caratteri';
            return;
        }
        
        if (password.length < 6) {
            errorDiv.textContent = 'La password deve essere almeno di 6 caratteri';
            return;
        }
        
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, 'users', userCredential.user.uid), { 
                list: [],
                username: username,
                email: email,
                createdAt: new Date()
            });
            successDiv.textContent = '✅ Registrazione completata! Ora puoi accedere.';
            setTimeout(() => window.showLoginPanel(), 2000);
        } catch (error) {
            let msg = error.code === 'auth/email-already-in-use' ? 'Email già registrata' :
                      error.code === 'auth/invalid-email' ? 'Email non valida' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.logout = async function() {
        await signOut(auth);
        window.location.reload();
    };

    window.showLoginPanel = function() {
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('registerPanel').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    };

    window.showRegisterPanel = function() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('registerPanel').style.display = 'block';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    };

    window.openLoginModal = function() {
        window.showLoginPanel();
        document.getElementById('authModal').style.display = 'flex';
    };

    async function loadUserData() {
        if (!currentUser) return null;
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        return userDoc.exists() ? userDoc.data() : null;
    }

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const authButtons = document.getElementById('authButtons');
        
        if (user) {
            const userData = await loadUserData();
            const displayName = userData?.username || user.email.split('@')[0];
            authButtons.innerHTML = `
                <div class="user-info">
                    <span>👤</span>
                    <span class="username">${escapeHtml(displayName)}</span>
                    <button class="logout-btn" onclick="window.logout()" style="padding: 4px 10px;">🚪</button>
                </div>
            `;
        } else {
            authButtons.innerHTML = `<button class="login-btn" onclick="window.openLoginModal()">🔐 Accedi</button>`;
        }
    });

    function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

    window.goHome = function() { window.location.href = "index.html"; };
    window.goToList = function() { window.location.href = "list.html"; };
</script>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

// Variabili per Attori
let currentPerson = null;
let actingMovies = [], actingTvShows = [], directingMovies = [], directingTvShows = [];
let currentPage = 1, itemsPerPage = 20, currentSortBy = "popularity";
let currentRoleTab = "acting", currentMediaTab = "movies";
let actorSearchTimeout = null;

// Variabili per Studi
let currentStudio = null;
let studioMovies = [];
let currentStudioPage = 1, studioItemsPerPage = 20, studioSortBy = "popularity";
let studioSearchTimeout = null;

// ============ CAMBIO TAB ============
function switchSearchTab(tab) {
    if (tab === 'actors') {
        document.getElementById('tab-actors').classList.add('active');
        document.getElementById('tab-studios').classList.remove('active');
        document.getElementById('actors-section').style.display = 'block';
        document.getElementById('studios-section').style.display = 'none';
    } else {
        document.getElementById('tab-actors').classList.remove('active');
        document.getElementById('tab-studios').classList.add('active');
        document.getElementById('actors-section').style.display = 'none';
        document.getElementById('studios-section').style.display = 'block';
    }
    document.getElementById('resultsContainer').innerHTML = '';
}

// ============ RICERCA ATTORI ============
function handleActorInputChange() {
    const query = document.getElementById('actorSearchInput').value.trim();
    
    if (actorSearchTimeout) clearTimeout(actorSearchTimeout);
    
    if (query.length < 2) {
        document.getElementById('actorSuggestions').classList.remove('show');
        return;
    }
    
    actorSearchTimeout = setTimeout(async () => {
        try {
            const url = `https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=it-IT&page=1`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.results && data.results.length > 0) {
                displayActorSuggestions(data.results.slice(0, 8));
            } else {
                document.getElementById('actorSuggestions').classList.remove('show');
            }
        } catch (error) {
            console.error("Errore suggerimenti attori:", error);
        }
    }, 300);
}

function displayActorSuggestions(suggestions) {
    const container = document.getElementById('actorSuggestions');
    container.innerHTML = suggestions.map(person => {
        const photoUrl = person.profile_path ? `https://image.tmdb.org/t/p/w92${person.profile_path}` : "https://via.placeholder.com/40x40?text=No+Photo";
        return `
            <div class="suggestion-item" onclick="searchPersonById(${person.id}, '${escapeHtml(person.name).replace(/'/g, "\\'")}')">
                <img class="suggestion-icon" src="${photoUrl}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                <div class="suggestion-info">
                    <div class="suggestion-name">${escapeHtml(person.name)}</div>
                    <div class="suggestion-sub">${person.known_for_department || "Artista"}</div>
                </div>
            </div>
        `;
    }).join("");
    container.classList.add('show');
}

function searchActorFromInput() {
    const query = document.getElementById('actorSearchInput').value.trim();
    if (!query) {
        alert("Inserisci il nome di un attore o regista");
        return;
    }
    searchPersonByName(query);
}

function searchPersonByName(personName) {
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '<div class="loading">⏳ Cerco artista...</div>';
    
    fetch(`https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(personName)}&language=it-IT&page=1`)
        .then(res => res.json())
        .then(data => {
            if (!data.results || data.results.length === 0) {
                container.innerHTML = '<div class="no-results">😕 Nessun artista trovato</div>';
                return;
            }
            const person = data.results[0];
            searchPersonById(person.id, person.name);
        })
        .catch(error => {
            console.error("Errore:", error);
            container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
        });
}

async function searchPersonById(personId, personName) {
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '<div class="loading">⏳ Carico informazioni...</div>';
    
    try {
        const [personRes, creditsRes] = await Promise.all([
            fetch(`https://api.themoviedb.org/3/person/${personId}?api_key=${API_KEY}&language=it-IT`),
            fetch(`https://api.themoviedb.org/3/person/${personId}/combined_credits?api_key=${API_KEY}&language=it-IT`)
        ]);
        
        const personData = await personRes.json();
        const creditsData = await creditsRes.json();
        
        currentPerson = personData;
        
        const allCredits = creditsData.cast || [];
        const allCrew = creditsData.crew || [];
        
        actingMovies = allCredits.filter(item => item.media_type === "movie");
        actingTvShows = allCredits.filter(item => item.media_type === "tv");
        directingMovies = allCrew.filter(item => item.job === "Director" && item.media_type === "movie");
        directingTvShows = allCrew.filter(item => item.job === "Director" && item.media_type === "tv");
        
        currentPage = 1;
        currentRoleTab = "acting";
        currentMediaTab = "movies";
        
        displayPersonProfile(personData);
        
        const newUrl = `${window.location.pathname}?person=${encodeURIComponent(personName)}`;
        window.history.pushState({}, "", newUrl);
        
    } catch (error) {
        console.error("Errore:", error);
        container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
    }
}

function displayPersonProfile(person) {
    const container = document.getElementById('resultsContainer');
    const photoUrl = person.profile_path ? `https://image.tmdb.org/t/p/w500${person.profile_path}` : "https://via.placeholder.com/300x300?text=No+Photo";
    const birthYear = person.birthday ? person.birthday.split("-")[0] : "?";
    const deathYear = person.deathday ? ` - ${person.deathday.split("-")[0]}` : "";
    const bioFull = person.biography || "";
    const bioPreview = bioFull.substring(0, 300);
    const hasMore = bioFull.length > 300;
    const bioId = "bio-text-" + Date.now();
    
    const profileHtml = `
        <div class="actor-profile">
            <img class="actor-photo" src="${photoUrl}" alt="${person.name}" loading="lazy">

                <h2 class="actor-name">${escapeHtml(person.name)}</h2>

                        <div class="actor-stat-label">Recitazione</div>

                        <div class="actor-stat-value">${directingMovies.length + directingTvShows.length}</div>

                    <div class="actor-bio" id="${bioId}">

                    </div>
                    ${hasMore ? `<button class="bio-toggle-btn" onclick="toggleBio('${bioId}')">📖 Mostra altro</button>` : ''}

        <div class="role-tabs">
            <button id="role-acting-btn" class="role-tab-btn active" onclick="switchRoleTab('acting')">🎭 Recitazione (${actingMovies.length + actingTvShows.length})</button>

}

function toggleBio(bioId) {
    const bioDiv = document.getElementById(bioId);
    if (!bioDiv) return;
    const preview = bioDiv.querySelector('.bio-preview');
    const full = bioDiv.querySelector('.bio-full');
    const btn = bioDiv.parentElement.querySelector('.bio-toggle-btn');
    if (!preview || !full) return;
    if (full.style.display === 'none') {
        preview.style.display = 'none';
        full.style.display = 'inline';
        btn.innerHTML = '📖 Mostra meno';
    } else {
        preview.style.display = 'inline';
        full.style.display = 'none';
        btn.innerHTML = '📖 Mostra altro';
    }
}

function switchRoleTab(tab) {
    currentRoleTab = tab;

}

function switchMediaTab(tab) {
    currentMediaTab = tab;
    currentPage = 1;

    document.getElementById(`media-${tab}-btn`).classList.add('active');

    else displayDirectingContent();
}

function sortItems(items, sortType) {
    const sorted = [...items];
    switch(sortType) {
        case "popularity": sorted.sort((a,b) => (b.popularity||0) - (a.popularity||0)); break;
        case "date_desc": sorted.sort((a,b) => new Date(b.release_date||b.first_air_date||0) - new Date(a.release_date||a.first_air_date||0)); break;
        case "date_asc": sorted.sort((a,b) => new Date(a.release_date||a.first_air_date||0) - new Date(b.release_date||b.first_air_date||0)); break;
        case "rating": sorted.sort((a,b) => (b.vote_average||0) - (a.vote_average||0)); break;
        case "title": sorted.sort((a,b) => (a.title||a.name||"").localeCompare(b.title||b.name||"")); break;
        default: sorted.sort((a,b) => (b.popularity||0) - (a.popularity||0));
    }
    return sorted;
}

            </select></div>
        </div>
        ${items.length === 0 ? '<div class="no-results">😕 Nessun elemento trovato</div>' : `
            <div class="grid">${paginated.map(item => {
                const title = item.title || item.name;
                const year = (item.release_date || item.first_air_date || "").split("-")[0] || "N/D";
                const poster = item.poster_path ? IMG_BASE + item.poster_path : "https://via.placeholder.com/500x750?text=No+Poster";
                const character = item.character ? `🎭 ${escapeHtml(item.character)}` : '';

            ${totalPages > 1 ? `<div class="pagination-controls"><button class="pagination-btn" onclick="changePage(-1)" ${currentPage===1?'disabled':''}>◀ Prec</button><span class="page-info">${currentPage}/${totalPages}</span><button class="pagination-btn" onclick="changePage(1)" ${currentPage===totalPages?'disabled':''}>Succ ▶</button></div>` : ''}

    `;

function displayDirectingContent() {

    const sorted = sortItems(items, currentSortBy);
    const totalPages = Math.ceil(sorted.length / itemsPerPage);

    const mediaIcon = currentMediaTab === 'movies' ? '🎬' : '📺';
    const mediaType = currentMediaTab === 'movies' ? 'Film' : 'Serie TV';
    
    roleContent.innerHTML = `
        <div class="media-tabs">
            <button id="media-movies-btn" class="media-tab-btn ${currentMediaTab === 'movies' ? 'active' : ''}" onclick="switchMediaTab('movies')">🎬 Film Diretti (${directingMovies.length})</button>
            <button id="media-tv-btn" class="media-tab-btn ${currentMediaTab === 'tv' ? 'active' : ''}" onclick="switchMediaTab('tv')">📺 Serie TV Dirette (${directingTvShows.length})</button>
        </div>
        <div class="sort-selectors">
            <div class="sort-group"><label>📋 Ordina per:</label><select id="sortSelect" onchange="changeSort()">
                <option value="popularity" ${currentSortBy==="popularity"?"selected":""}>🔥 Più popolari</option>
                <option value="date_desc" ${currentSortBy==="date_desc"?"selected":""}>📅 Più recenti</option>
                <option value="date_asc" ${currentSortBy==="date_asc"?"selected":""}>📅 Più vecchi</option>

                <option value="30" ${itemsPerPage===30?"selected":""}>30</option><option value="50" ${itemsPerPage===50?"selected":""}>50</option>
            </select></div>
        </div>
        ${items.length === 0 ? '<div class="no-results">😕 Nessun elemento trovato</div>' : `
            <div class="grid">${paginated.map(item => {

                return `<div class="card" onclick="openPage(${item.id}, '${currentMediaTab === 'movies' ? 'movie' : 'tv'}')">

function changeSort() {
    const select = document.getElementById("sortSelect");
    if (select) { currentSortBy = select.value; currentPage = 1; if (currentRoleTab === 'acting') displayActingContent(); else displayDirectingContent(); }
}
function changeItemsPerPage() {
    const select = document.getElementById("itemsPerPageSelect");
    if (select) { itemsPerPage = parseInt(select.value); currentPage = 1; if (currentRoleTab === 'acting') displayActingContent(); else displayDirectingContent(); }
}
function changePage(direction) {
    const items = currentRoleTab === 'acting' ? (currentMediaTab === 'movies' ? actingMovies : actingTvShows) : (currentMediaTab === 'movies' ? directingMovies : directingTvShows);
    const totalPages = Math.ceil(items.length / itemsPerPage);
    const newPage = currentPage + direction;
    if (newPage >= 1 && newPage <= totalPages) { currentPage = newPage; if (currentRoleTab === 'acting') displayActingContent(); else displayDirectingContent(); window.scrollTo({ top: document.querySelector(".role-tabs").offsetTop - 80, behavior: "smooth" }); }
}

// ============ RICERCA STUDI ============
function handleStudioInputChange() {
    const query = document.getElementById('studioSearchInput').value.trim();
    if (studioSearchTimeout) clearTimeout(studioSearchTimeout);
    if (query.length < 2) { document.getElementById('studioSuggestions').classList.remove('show'); return; }
    studioSearchTimeout = setTimeout(async () => {
        try {
            const url = `https://api.themoviedb.org/3/search/company?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=it-IT&page=1`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.results && data.results.length > 0) displayStudioSuggestions(data.results.slice(0, 8));
            else document.getElementById('studioSuggestions').classList.remove('show');
        } catch (error) { console.error("Errore suggerimenti studi:", error); }
    }, 300);
}

function displayStudioSuggestions(suggestions) {
    const container = document.getElementById('studioSuggestions');
    container.innerHTML = suggestions.map(studio => `
        <div class="suggestion-item" onclick="searchStudioById(${studio.id}, '${escapeHtml(studio.name).replace(/'/g, "\\'")}')">
            <div class="suggestion-icon" style="background:rgba(124,58,237,0.3);border-radius:12px;">🏢</div>
            <div class="suggestion-info"><div class="suggestion-name">${escapeHtml(studio.name)}</div><div class="suggestion-sub">Studio di produzione</div></div>
        </div>
    `).join("");
    container.classList.add('show');
}

function searchStudioFromInput() {
    const query = document.getElementById('studioSearchInput').value.trim();
    if (!query) { alert("Inserisci il nome di uno studio"); return; }
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '<div class="loading">⏳ Cerco studio...</div>';
    fetch(`https://api.themoviedb.org/3/search/company?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=it-IT&page=1`)
        .then(res => res.json())
        .then(data => {
            if (!data.results || data.results.length === 0) { container.innerHTML = '<div class="no-results">😕 Nessuno studio trovato</div>'; return; }
            const studio = data.results[0];
            searchStudioById(studio.id, studio.name);
        })
        .catch(error => { console.error("Errore:", error); container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>'; });
}

async function searchStudioById(studioId, studioName) {
    document.getElementById('studioSearchInput').value = studioName;
    document.getElementById('studioSuggestions').classList.remove('show');
    const container = document.getElementById('resultsContainer');
    container.innerHTML = '<div class="loading">⏳ Carico film dello studio...</div>';
    try {
        const studioUrl = `https://api.themoviedb.org/3/company/${studioId}?api_key=${API_KEY}&language=it-IT`;
        const studioRes = await fetch(studioUrl);
        const studioData = await studioRes.json();
        currentStudio = studioData;
        await searchMoviesByStudio(studioId, studioName);
        const newUrl = `${window.location.pathname}?studio=${encodeURIComponent(studioName)}`;
        window.history.pushState({}, "", newUrl);
    } catch (error) { console.error("Errore:", error); container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>'; }
}

async function searchMoviesByStudio(companyId, studioName) {
    studioMovies = [];
    try {
        let page = 1;
        while (page <= 5) {
            const url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=it-IT&with_companies=${companyId}&sort_by=popularity.desc&page=${page}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.results) {
                for (const movie of data.results) if (!studioMovies.some(m => m.id === movie.id)) studioMovies.push(movie);
            }
            if (data.page >= data.total_pages) break;
            page++;
        }
        displayStudioProfile(studioName);
    } catch (error) { console.error("Errore:", error); document.getElementById('resultsContainer').innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>'; }
}

function displayStudioProfile(studioName) {
    const container = document.getElementById('resultsContainer');
    const movieCount = studioMovies.length;
    const avgRating = movieCount > 0 ? (studioMovies.reduce((sum, m) => sum + (m.vote_average || 0), 0) / movieCount).toFixed(1) : 0;
    container.innerHTML = `
        <div class="studio-profile">
            <div class="studio-header">
                <div class="studio-logo">🏢</div>
                <div><h2 class="studio-name">${escapeHtml(studioName)}</h2>
                <div class="studio-stats">
                    <div class="studio-stat"><div class="studio-stat-value">${movieCount}</div><div class="studio-stat-label">Film</div></div>
                    <div class="studio-stat"><div class="studio-stat-value">${avgRating}</div><div class="studio-stat-label">⭐ Media Voto</div></div>
                </div></div>
            </div>
        </div>
        <div class="sort-selectors">
            <div class="sort-group"><label>📋 Ordina per:</label><select id="studioSortSelect" onchange="changeStudioSort()">
                <option value="popularity" ${studioSortBy==="popularity"?"selected":""}>🔥 Più popolari</option>
                <option value="date_desc" ${studioSortBy==="date_desc"?"selected":""}>📅 Più recenti</option>
                <option value="date_asc" ${studioSortBy==="date_asc"?"selected":""}>📅 Più vecchi</option>
                <option value="rating" ${studioSortBy==="rating"?"selected":""}>⭐ Miglior voto</option>
                <option value="title" ${studioSortBy==="title"?"selected":""}>🔤 Titolo A-Z</option>
            </select></div>
            <div class="sort-group"><label>Mostra:</label><select id="studioItemsPerPageSelect" onchange="changeStudioItemsPerPage()">
                <option value="12" ${studioItemsPerPage===12?"selected":""}>12</option><option value="20" ${studioItemsPerPage===20?"selected":""}>20</option>
                <option value="30" ${studioItemsPerPage===30?"selected":""}>30</option><option value="50" ${studioItemsPerPage===50?"selected":""}>50</option>
            </select></div>
        </div>
        <div id="studioMoviesContainer"></div>
    `;
    displayStudioMovies();
}

function sortStudioMovies() {
    const sorted = [...studioMovies];
    switch(studioSortBy) {
        case "popularity": sorted.sort((a,b) => (b.popularity||0) - (a.popularity||0)); break;
        case "date_desc": sorted.sort((a,b) => new Date(b.release_date||0) - new Date(a.release_date||0)); break;
        case "date_asc": sorted.sort((a,b) => new Date(a.release_date||0) - new Date(b.release_date||0)); break;
        case "rating": sorted.sort((a,b) => (b.vote_average||0) - (a.vote_average||0)); break;
        case "title": sorted.sort((a,b) => (a.title||"").localeCompare(b.title||"")); break;
    }
    return sorted;
}

function displayStudioMovies() {
    const container = document.getElementById('studioMoviesContainer');
    if (!container) return;
    const sorted = sortStudioMovies();
    const totalPages = Math.ceil(sorted.length / studioItemsPerPage);
    const start = (currentStudioPage - 1) * studioItemsPerPage;
    const paginated = sorted.slice(start, start + studioItemsPerPage);
    if (sorted.length === 0) { container.innerHTML = '<div class="no-results">😕 Nessun film trovato</div>'; return; }
    container.innerHTML = `
        <div class="grid">${paginated.map(movie => `
            <div class="card" onclick="openPage(${movie.id}, 'movie')">
                <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" loading="lazy">
                <div class="card-content"><h4>${escapeHtml(movie.title)}</h4><p>⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}/10</p><p class="year">📅 ${movie.release_date ? movie.release_date.split("-")[0] : "N/D"}</p></div>
            </div>`).join("")}</div>
        ${totalPages > 1 ? `<div class="pagination-controls"><button class="pagination-btn" onclick="changeStudioPage(-1)" ${currentStudioPage===1?'disabled':''}>◀ Prec</button><span class="page-info">${currentStudioPage}/${totalPages}</span><button class="pagination-btn" onclick="changeStudioPage(1)" ${currentStudioPage===totalPages?'disabled':''}>Succ ▶</button></div>` : ''}
    `;
}

function changeStudioSort() { const select = document.getElementById('studioSortSelect'); if(select){studioSortBy=select.value; currentStudioPage=1; displayStudioMovies();} }
function changeStudioItemsPerPage() { const select = document.getElementById('studioItemsPerPageSelect'); if(select){studioItemsPerPage=parseInt(select.value); currentStudioPage=1; displayStudioMovies();} }
function changeStudioPage(direction) { const newPage = currentStudioPage + direction; if(newPage>=1 && newPage<=Math.ceil(studioMovies.length/studioItemsPerPage)){currentStudioPage=newPage; displayStudioMovies(); window.scrollTo({top:document.querySelector('.studio-profile').offsetTop-100,behavior:'smooth'});} }

// ============ FUNZIONI COMUNI ============
function openPage(id, type) { window.location.href = `${type}.html?id=${id}`; }
function escapeHtml(text) { if (!text) return ""; const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }

// Event listener
document.getElementById('actorSearchInput').addEventListener('input', handleActorInputChange);
document.getElementById('actorSearchInput').addEventListener('keypress', e => { if(e.key === 'Enter') searchActorFromInput(); });
document.getElementById('studioSearchInput').addEventListener('input', handleStudioInputChange);
document.getElementById('studioSearchInput').addEventListener('keypress', e => { if(e.key === 'Enter') searchStudioFromInput(); });

document.addEventListener('click', e => {
    if(!document.querySelector('#actors-section .search-box')?.contains(e.target)) document.getElementById('actorSuggestions')?.classList.remove('show');
    if(!document.querySelector('#studios-section .search-box')?.contains(e.target)) document.getElementById('studioSuggestions')?.classList.remove('show');
});

// URL params
const urlPerson = new URLSearchParams(window.location.search).get('person');
if(urlPerson) { document.getElementById('actorSearchInput').value = decodeURIComponent(urlPerson); searchPersonByName(decodeURIComponent(urlPerson)); }
const urlStudio = new URLSearchParams(window.location.search).get('studio');
if(urlStudio) { document.getElementById('studioSearchInput').value = decodeURIComponent(urlStudio); searchStudioFromInput(); }
</script>
