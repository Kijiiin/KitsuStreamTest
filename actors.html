<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right { display: flex; gap: 8px; align-items: center; }
.topbar-center { flex: 1; text-align: center; }

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.actors-nav-btn { background: rgba(236, 72, 153, 0.9); }
.login-btn { background: rgba(16, 185, 129, 0.9); }
.logout-btn { background: rgba(239, 68, 68, 0.9); }
.user-info { 
    font-size: 12px; 
    background: rgba(0,0,0,0.5); 
    padding: 4px 12px; 
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.username { font-weight: bold; color: #c084fc; }

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e1b4b;

}

.modal-content input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d2a5e;
    color: white;
}

.modal-content button { margin: 5px; padding: 10px 20px; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 10px; }

.container { max-width: 1200px; margin: auto; padding: 16px; }

/* Sezione ricerca attori */
.actor-search-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
}

.actor-search-title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #c084fc;
}

.actor-search-box {
    display: flex;
    gap: 10px;
    max-width: 500px;
    margin: 15px auto;
    position: relative;
}

.actor-search-box input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 30px;
    border: none;
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 14px;
}

.actor-search-box input::placeholder {
    color: rgba(255,255,255,0.5);
}

.actor-search-box input:focus {
    outline: none;
    border: 1px solid #7c3aed;
    background: rgba(0,0,0,0.7);
}

.actor-search-btn {
    background: #7c3aed;
    border: none;
    padding: 12px 20px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-weight: 600;
}

.actor-search-btn:hover {
    background: #6d28d9;
}

/* Suggerimenti autocomplete */
.suggestions-container {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: rgba(31, 27, 58, 0.95);
    backdrop-filter: blur(15px);
    border-radius: 16px;
    margin-top: 5px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 1000;
    border: 1px solid rgba(124, 58, 237, 0.5);
    display: none;
}

.suggestions-container.show {
    display: block;
}

.suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-bottom: 1px solid rgba(124, 58, 237, 0.2);
}

.suggestion-item:hover {
    background: rgba(124, 58, 237, 0.3);
}

.suggestion-photo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
}

.suggestion-info {
    flex: 1;
    text-align: left;
}

.suggestion-name {
    font-weight: bold;
    font-size: 14px;
    color: #c084fc;
}

.suggestion-known {
    font-size: 11px;
    color: #aaa;
}

.suggestion-year {
    font-size: 11px;
    color: #ffd700;
}

/* Profilo attore */
.actor-profile {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.actor-photo {

    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #c084fc;
}

.actor-name {
    font-size: 24px;
    font-weight: bold;
    color: #c084fc;
}

.actor-bio {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    max-width: 600px;
}

.actor-stats {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.actor-stat {
    text-align: center;
}

.actor-stat-value {
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
}

.actor-stat-label {
    font-size: 11px;
    color: #aaa;
}

/* TABS per Film e Serie TV */
.content-tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0;
    border-bottom: 1px solid rgba(124, 58, 237, 0.3);
    padding-bottom: 0;
}

.tab-btn {
    background: transparent;
    border: none;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: 600;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    border-radius: 0;
}

.tab-btn.active {
    color: #c084fc;
}

.tab-btn.active::after {
    content: '';

    bottom: -1px;
    left: 0;
    right: 0;

    background: linear-gradient(90deg, #a855f7, #7c3aed);

}

.tab-btn:hover:not(.active) {
    color: #c084fc;
    background: rgba(124, 58, 237, 0.1);
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* Selettori di ordinamento */
.sort-selectors {
    background: rgba(31, 27, 58, 0.4);
    border-radius: 16px;
    padding: 15px;
    margin: 20px 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.sort-group {
    display: flex;
    align-items: center;

}

.sort-group label {

}

.sort-group select {

    cursor: pointer;

}

.sort-group select:hover {

/* Sezioni Film e Serie TV */
.media-section {
    margin-top: 10px;
}

.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 20px;
    padding-bottom: 10px;
}

.section-title {
    font-size: 18px;
    color: #c084fc;
    display: flex;
    align-items: center;
    gap: 10px;
}

.section-count {
    background: rgba(124, 58, 237, 0.5);
    padding: 4px 12px;
    border-radius: 30px;
    font-size: 14px;
}

.pagination-controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

.pagination-btn {
    background: rgba(124, 58, 237, 0.8);
    border: none;
    padding: 6px 14px;

    color: white;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
}

.pagination-btn:hover:not(:disabled) {
    background: #7c3aed;
    transform: scale(1.02);
}

.pagination-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.page-info {
    font-size: 13px;
    color: #c084fc;
}

.items-per-page {
    background: rgba(124, 58, 237, 0.5);
    border: 1px solid #7c3aed;
    padding: 6px 10px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.card {
    background: rgba(31, 27, 58, 0.6);

    backdrop-filter: blur(10px);

    cursor: pointer;
}
.card:active { transform: scale(0.98); }
.card img {
    width: 100%;

}
.card-content { padding: 8px; }
.card h4 {
    margin: 0 0 3px;

    white-space: nowrap;

}
.card p { font-size: 9px; color: #c084fc; margin-bottom: 3px; }
.card .year { font-size: 9px; color: #aaa; }
.card .character { 
    font-size: 9px; 
    color: #ffd700;
    margin-top: 5px;
    font-style: italic;
}

.loading, .no-results {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #c084fc;
}

@media (min-width: 769px) {
    .topbar { padding: 20px 30px; }
    h1 { font-size: 28px; }
    .back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn { padding: 10px 20px; font-size: 14px; }
    .container { padding: 30px; margin: 40px auto; }
    .actor-profile { flex-direction: row; align-items: center; text-align: left; gap: 30px; }
    .actor-photo { width: 180px; height: 180px; }

    .card h4 { font-size: 14px; }
    .card p, .card .year, .card .character { font-size: 11px; }

}

@media (min-width: 769px) and (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }

.suggestions-container::-webkit-scrollbar {
    width: 5px;
}
.suggestions-container::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
}
.suggestions-container::-webkit-scrollbar-thumb {
    background: #7c3aed;
    border-radius: 10px;
}
</style>

<script type="module">

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";

let currentActor = null;
let allMovies = [];
let allTvShows = [];

let currentMoviePage = 1;
let currentTvPage = 1;
let itemsPerPage = 20;
let movieSortBy = "popularity";
let tvSortBy = "popularity";
let currentTab = "movies"; // 'movies' or 'tv'

let searchTimeout = null;

function getActorFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('actor');
}

window.onload = function() {
    const input = document.getElementById("actorSearchInput");
    
    input.addEventListener("input", handleInputChange);
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") searchFromInput();
    });
    
    document.addEventListener("click", function(e) {
        const container = document.getElementById("suggestions");
        const searchBox = document.querySelector(".actor-search-box");
        if (!searchBox.contains(e.target)) {
            container.classList.remove("show");
        }
    });
    
    const actorName = getActorFromURL();
    if (actorName) {
        input.value = decodeURIComponent(actorName);
        searchActorByName(decodeURIComponent(actorName));
    }
};

function switchTab(tab) {
    currentTab = tab;
    
    // Aggiorna stile bottoni
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(`tab-${tab}-btn`).classList.add('active');
    
    // Mostra/nascondi contenuti
    document.getElementById('movies-content').classList.toggle('active', tab === 'movies');
    document.getElementById('tv-content').classList.toggle('active', tab === 'tv');
}

async function handleInputChange(e) {
    const query = e.target.value.trim();
    
    if (searchTimeout) clearTimeout(searchTimeout);
    
    if (query.length < 2) {
        document.getElementById("suggestions").classList.remove("show");
        return;
    }
    
    searchTimeout = setTimeout(async () => {
        await fetchSuggestions(query);
    }, 300);
}

async function fetchSuggestions(query) {
    try {
        const url = `https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=it-IT&page=1`;
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.results && data.results.length > 0) {
            displaySuggestions(data.results.slice(0, 8));
        } else {
            document.getElementById("suggestions").classList.remove("show");
        }
    } catch (error) {
        console.error("Errore suggerimenti:", error);
    }
}

function displaySuggestions(suggestions) {
    const container = document.getElementById("suggestions");
    
    container.innerHTML = suggestions.map(actor => {
        const photoUrl = actor.profile_path ? `https://image.tmdb.org/t/p/w92${actor.profile_path}` : "https://via.placeholder.com/40x40?text=No+Photo";
        const birthYear = actor.birthday ? actor.birthday.split("-")[0] : "";
        const knownFor = actor.known_for_department || "Attore";
        
        return `
            <div class="suggestion-item" onclick="searchActorById(${actor.id}, '${escapeHtml(actor.name).replace(/'/g, "\\'")}')">
                <img class="suggestion-photo" src="${photoUrl}" alt="${actor.name}">
                <div class="suggestion-info">
                    <div class="suggestion-name">${escapeHtml(actor.name)}</div>
                    <div class="suggestion-known">${knownFor}</div>
                </div>
                ${birthYear ? `<div class="suggestion-year">📅 ${birthYear}</div>` : ''}
            </div>
        `;
    }).join("");
    
    container.classList.add("show");
}

function searchActorById(actorId, actorName) {
    document.getElementById("actorSearchInput").value = actorName;
    document.getElementById("suggestions").classList.remove("show");
    searchActorByIdOnly(actorId, actorName);
}

async function searchActorByIdOnly(actorId, actorName) {
    const container = document.getElementById("resultsContainer");
    container.innerHTML = '<div class="loading">⏳ Carico film e serie TV...</div>';
    
    try {
        const personUrl = `https://api.themoviedb.org/3/person/${actorId}?api_key=${API_KEY}&language=it-IT`;
        const personResponse = await fetch(personUrl);
        const actorData = await personResponse.json();
        
        const creditsUrl = `https://api.themoviedb.org/3/person/${actorId}/combined_credits?api_key=${API_KEY}&language=it-IT`;
        const creditsResponse = await fetch(creditsUrl);
        const creditsData = await creditsResponse.json();
        
        currentActor = actorData;
        allMovies = (creditsData.cast || []).filter(item => item.media_type === "movie");
        allTvShows = (creditsData.cast || []).filter(item => item.media_type === "tv");
        
        const sortByPopularity = (a, b) => (b.popularity || 0) - (a.popularity || 0);
        allMovies.sort(sortByPopularity);
        allTvShows.sort(sortByPopularity);
        
        currentMoviePage = 1;
        currentTvPage = 1;
        
        displayActorProfile(currentActor, allMovies.length, allTvShows.length);
        displayTabsAndSortSelectors();
        displayMoviesPaginated();
        displayTvShowsPaginated();
        
        currentTab = "movies";
        switchTab("movies");
        
        const newUrl = `${window.location.pathname}?actor=${encodeURIComponent(actorName)}`;
        window.history.pushState({}, "", newUrl);
        
    } catch (error) {
        console.error("Errore:", error);
        container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
    }
}

function searchActorByName(actorName) {
    const container = document.getElementById("resultsContainer");
    container.innerHTML = '<div class="loading">⏳ Cerco attore...</div>';
    
    const personUrl = `https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(actorName)}&language=it-IT&page=1`;
    fetch(personUrl)
        .then(response => response.json())
        .then(personData => {
            if (!personData.results || personData.results.length === 0) {
                container.innerHTML = '<div class="no-results">😕 Nessun attore trovato con questo nome</div>';
                return;
            }
            const actor = personData.results[0];
            searchActorByIdOnly(actor.id, actor.name);
        })
        .catch(error => {
            console.error("Errore:", error);
            container.innerHTML = '<div class="no-results">❌ Errore nel caricamento</div>';
        });
}

function searchFromInput() {
    const query = document.getElementById("actorSearchInput").value.trim();
    if (!query) {
        alert("Inserisci il nome di un attore");
        return;
    }
    searchActorByName(query);
}

function sortItems(items, sortType) {
    const sorted = [...items];
    switch(sortType) {
        case "popularity":
            sorted.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
            break;
        case "date_desc":
            const getDate = (item) => {
                const date = item.release_date || item.first_air_date;
                return date ? new Date(date) : new Date(0);
            };
            sorted.sort((a, b) => getDate(b) - getDate(a));
            break;
        case "date_asc":
            const getDateAsc = (item) => {
                const date = item.release_date || item.first_air_date;
                return date ? new Date(date) : new Date(0);
            };
            sorted.sort((a, b) => getDateAsc(a) - getDateAsc(b));
            break;
        case "rating":
            sorted.sort((a, b) => (b.vote_average || 0) - (a.vote_average || 0));
            break;
        case "title":
            const getTitle = (item) => (item.title || item.name || "").toLowerCase();
            sorted.sort((a, b) => getTitle(a).localeCompare(getTitle(b)));
            break;
        default:
            sorted.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
    }
    return sorted;
}

function changeMovieSort() {
    const select = document.getElementById("movieSortSelect");
    if (select) {
        movieSortBy = select.value;
        currentMoviePage = 1;
        displayMoviesPaginated();

function displayActorProfile(actor, movieCount, tvCount) {
    const container = document.getElementById("resultsContainer");
    const photoUrl = actor.profile_path ? `https://image.tmdb.org/t/p/w500${actor.profile_path}` : "https://via.placeholder.com/300x300?text=No+Photo";
    const birthYear = actor.birthday ? actor.birthday.split("-")[0] : "?";
    const deathYear = actor.deathday ? ` - ${actor.deathday.split("-")[0]}` : "";
    
    const profileHtml = `
        <div class="actor-profile">
            <img class="actor-photo" src="${photoUrl}" alt="${actor.name}" loading="lazy">
            <div>
                <h2 class="actor-name">${escapeHtml(actor.name)}</h2>
                <div class="actor-stats">
                    <div class="actor-stat">
                        <div class="actor-stat-value" id="moviesCount">${movieCount}</div>
                        <div class="actor-stat-label">Film</div>
                    </div>
                    <div class="actor-stat">
                        <div class="actor-stat-value" id="tvCount">${tvCount}</div>
                        <div class="actor-stat-label">Serie TV</div>
                    </div>
                    <div class="actor-stat">
                        <div class="actor-stat-value">${actor.popularity ? Math.round(actor.popularity) : "?"}</div>
                        <div class="actor-stat-label">Popolarità</div>
                    </div>
                </div>
                ${actor.biography ? `<div class="actor-bio">${escapeHtml(actor.biography.substring(0, 300))}${actor.biography.length > 300 ? "..." : ""}</div>` : ""}
                <div class="actor-bio" style="font-size: 12px; margin-top: 10px;">📅 ${birthYear}${deathYear} | 🌍 ${actor.place_of_birth ? escapeHtml(actor.place_of_birth) : "N/D"}</div>
            </div>
        </div>
    `;
    
    container.innerHTML = profileHtml;
}

    const container = document.getElementById("resultsContainer");
    
    const tabsAndSortHtml = `
        <div class="content-tabs">
            <button id="tab-movies-btn" class="tab-btn active" onclick="switchTab('movies')">🎬 Film <span id="moviesCountTab">(${allMovies.length})</span></button>
            <button id="tab-tv-btn" class="tab-btn" onclick="switchTab('tv')">📺 Serie TV <span id="tvCountTab">(${allTvShows.length})</span></button>
        </div>
        
        <div id="sort-selectors-placeholder"></div>
        
        <div id="movies-content" class="tab-content active">
            <div id="movies-section" class="media-section"></div>
        </div>
        
        <div id="tv-content" class="tab-content">
            <div id="tv-section" class="media-section"></div>
        </div>
    `;
    
    container.insertAdjacentHTML("beforeend", tabsAndSortHtml);
    
    const sortPlaceholder = document.getElementById("sort-selectors-placeholder");
    if (sortPlaceholder) {
        sortPlaceholder.innerHTML = `
            <div class="sort-selectors">
                <div class="sort-group">
                    <label>🎬 Film:</label>
                    <select id="movieSortSelect" onchange="changeMovieSort()">
                        <option value="popularity" ${movieSortBy === "popularity" ? "selected" : ""}>🔥 Più popolari</option>
                        <option value="date_desc" ${movieSortBy === "date_desc" ? "selected" : ""}>📅 Più recenti</option>
                        <option value="date_asc" ${movieSortBy === "date_asc" ? "selected" : ""}>📅 Più vecchi</option>
                        <option value="rating" ${movieSortBy === "rating" ? "selected" : ""}>⭐ Miglior voto</option>
                        <option value="title" ${movieSortBy === "title" ? "selected" : ""}>🔤 Titolo A-Z</option>
                    </select>
                </div>
                <div class="sort-group">
                    <label>📺 Serie TV:</label>
                    <select id="tvSortSelect" onchange="changeTvSort()">
                        <option value="popularity" ${tvSortBy === "popularity" ? "selected" : ""}>🔥 Più popolari</option>
                        <option value="date_desc" ${tvSortBy === "date_desc" ? "selected" : ""}>📅 Più recenti</option>
                        <option value="date_asc" ${tvSortBy === "date_asc" ? "selected" : ""}>📅 Più vecchi</option>
                        <option value="rating" ${tvSortBy === "rating" ? "selected" : ""}>⭐ Miglior voto</option>
                        <option value="title" ${tvSortBy === "title" ? "selected" : ""}>🔤 Titolo A-Z</option>
                    </select>
                </div>
            </div>
        `;
    }
}

function displayMoviesPaginated() {
    if (!allMovies.length) return;
    
    const sortedMovies = sortItems(allMovies, movieSortBy);
    const totalPages = Math.ceil(sortedMovies.length / itemsPerPage);
    const start = (currentMoviePage - 1) * itemsPerPage;
    const paginatedMovies = sortedMovies.slice(start, start + itemsPerPage);
    
    const section = document.getElementById("movies-section");
    if (!section) return;
    
    const moviesHtml = `
        <div class="section-header">
            <div class="section-title">
                🎬 Film
                <span class="section-count">${allMovies.length}</span>
            </div>
            <div class="pagination-controls">
                <span style="font-size: 12px;">Mostra:</span>
                <select id="movieItemsPerPage" class="items-per-page" onchange="changeMovieItemsPerPage()">
                    <option value="12" ${itemsPerPage === 12 ? 'selected' : ''}>12</option>
                    <option value="20" ${itemsPerPage === 20 ? 'selected' : ''}>20</option>
                    <option value="30" ${itemsPerPage === 30 ? 'selected' : ''}>30</option>
                    <option value="50" ${itemsPerPage === 50 ? 'selected' : ''}>50</option>
                </select>
            </div>
        </div>
        <div class="grid">
            ${paginatedMovies.map(movie => `
                <div class="card" onclick="openMoviePage(${movie.id})">
                    <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" alt="${movie.title}" loading="lazy">
                    <div class="card-content">
                        <h4>${escapeHtml(movie.title)}</h4>
                        <p>⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}/10</p>
                        <p class="year">📅 ${movie.release_date ? movie.release_date.split("-")[0] : "N/D"}</p>
                        ${movie.character ? `<p class="character">🎭 ${escapeHtml(movie.character)}</p>` : ""}
                    </div>
                </div>
            `).join("")}
        </div>
        ${totalPages > 1 ? `
            <div class="pagination-controls" style="justify-content: center; margin-top: 20px;">
                <button class="pagination-btn" onclick="changeMoviePage(-1)" ${currentMoviePage === 1 ? 'disabled' : ''}>◀ Prec</button>
                <span class="page-info">Pagina ${currentMoviePage} / ${totalPages}</span>
                <button class="pagination-btn" onclick="changeMoviePage(1)" ${currentMoviePage === totalPages ? 'disabled' : ''}>Succ ▶</button>
            </div>
        ` : ''}
    `;
    
    section.innerHTML = moviesHtml;
}

function displayTvShowsPaginated() {
    if (!allTvShows.length) return;
    
    const sortedTvShows = sortItems(allTvShows, tvSortBy);
    const totalPages = Math.ceil(sortedTvShows.length / itemsPerPage);
    const start = (currentTvPage - 1) * itemsPerPage;
    const paginatedTvShows = sortedTvShows.slice(start, start + itemsPerPage);
    
    const section = document.getElementById("tv-section");
    if (!section) return;
    
    const tvHtml = `
        <div class="section-header">
            <div class="section-title">
                📺 Serie TV
                <span class="section-count">${allTvShows.length}</span>
            </div>
            <div class="pagination-controls">
                <span style="font-size: 12px;">Mostra:</span>
                <select id="tvItemsPerPage" class="items-per-page" onchange="changeTvItemsPerPage()">
                    <option value="12" ${itemsPerPage === 12 ? 'selected' : ''}>12</option>
                    <option value="20" ${itemsPerPage === 20 ? 'selected' : ''}>20</option>
                    <option value="30" ${itemsPerPage === 30 ? 'selected' : ''}>30</option>
                    <option value="50" ${itemsPerPage === 50 ? 'selected' : ''}>50</option>
                </select>
            </div>
        </div>
        <div class="grid">
            ${paginatedTvShows.map(show => `
                <div class="card" onclick="openTVPage(${show.id})">
                    <img src="${show.poster_path ? IMG_BASE + show.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" alt="${show.name}" loading="lazy">
                    <div class="card-content">
                        <h4>${escapeHtml(show.name)}</h4>
                        <p>⭐ ${show.vote_average ? show.vote_average.toFixed(1) : "N/A"}/10</p>
                        <p class="year">📅 ${show.first_air_date ? show.first_air_date.split("-")[0] : "N/D"}</p>
                        ${show.character ? `<p class="character">🎭 ${escapeHtml(show.character)}</p>` : ""}
                    </div>
                </div>
            `).join("")}
        </div>
        ${totalPages > 1 ? `
            <div class="pagination-controls" style="justify-content: center; margin-top: 20px;">
                <button class="pagination-btn" onclick="changeTvPage(-1)" ${currentTvPage === 1 ? 'disabled' : ''}>◀ Prec</button>
                <span class="page-info">Pagina ${currentTvPage} / ${totalPages}</span>
                <button class="pagination-btn" onclick="changeTvPage(1)" ${currentTvPage === totalPages ? 'disabled' : ''}>Succ ▶</button>
            </div>
        ` : ''}
    `;
    
    section.innerHTML = tvHtml;
}

function changeMoviePage(direction) {
    const sortedMovies = sortItems(allMovies, movieSortBy);
    const totalPages = Math.ceil(sortedMovies.length / itemsPerPage);
    const newPage = currentMoviePage + direction;
    if (newPage >= 1 && newPage <= totalPages) {
        currentMoviePage = newPage;
        displayMoviesPaginated();
    }
}

function changeTvPage(direction) {
    const sortedTvShows = sortItems(allTvShows, tvSortBy);
    const totalPages = Math.ceil(sortedTvShows.length / itemsPerPage);
    const newPage = currentTvPage + direction;
    if (newPage >= 1 && newPage <= totalPages) {
        currentTvPage = newPage;
        displayTvShowsPaginated();
    }
}

function openMoviePage(id) {
    window.location.href = `movie.html?id=${id}`;
}

function openTVPage(id) {
    window.location.href = `tv.html?id=${id}`;
}

function goBack() { window.history.back(); }
function goToList() { window.location.href = "list.html"; }
function goToActors() { window.location.href = "actors.html"; }

function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}
