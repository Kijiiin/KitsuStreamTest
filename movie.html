<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right { display: flex; gap: 8px; align-items: center; }
.topbar-center { flex: 1; text-align: center; }

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.actors-nav-btn { background: rgba(236, 72, 153, 0.9); }
.login-btn { background: rgba(16, 185, 129, 0.9); }
.logout-btn { background: rgba(239, 68, 68, 0.9); }
.user-info { 
    font-size: 12px; 
    background: rgba(0,0,0,0.5); 
    padding: 4px 12px; 
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.username { font-weight: bold; color: #c084fc; }

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e1b4b;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    width: 90%;
    text-align: center;
}

.modal-content input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d2a5e;
    color: white;
}

.modal-content button { margin: 5px; padding: 10px 20px; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 10px; }
.success-msg { color: #4ade80; font-size: 12px; margin-top: 10px; }

.container { max-width: 1200px; margin: auto; padding: 16px; }

.movie-details {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.movie-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
}

.movie-poster { flex-shrink: 0; }
.movie-poster img { width: 180px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.movie-info { flex: 1; }
.movie-title { font-size: 24px; margin-bottom: 8px; color: #c084fc; }
.movie-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 12px 0; color: #aaa; font-size: 12px; }
.rating { color: #ffd700; font-size: 14px; }
.overview { margin: 16px 0; line-height: 1.5; color: #ddd; font-size: 13px; text-align: left; }
.genres { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 16px 0; }
.genre-tag { background: rgba(124, 58, 237, 0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px; }
.watch-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: center; }
.watch-btn, .list-toggle-btn { padding: 10px 20px; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; }
.watch-btn { background: #ef4444; color: white; }
.list-toggle-btn { background: #7c3aed; color: white; }

.info-section, .collection-section, .similar-section, .cast-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
}
.section-title { font-size: 18px; margin-bottom: 16px; color: #c084fc; }
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.info-card { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; }
.info-label { font-size: 10px; color: #888; margin-bottom: 4px; }
.info-value { font-size: 12px; font-weight: bold; color: #c084fc; }

.cast-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.cast-card { 
    background: rgba(0,0,0,0.3); 
    border-radius: 10px; 
    padding: 10px; 
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
}
.cast-card:hover {
    background: rgba(124, 58, 237, 0.5);
    transform: translateY(-3px);
}
.cast-photo { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
.cast-name { font-size: 12px; font-weight: bold; }
.cast-character { font-size: 10px; color: #aaa; }

.collection-grid, .similar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.collection-card, .similar-card { background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; cursor: pointer; }
.collection-poster, .similar-poster { width: 100%; height: 160px; object-fit: cover; }
.collection-info, .similar-info { padding: 8px; }
.collection-title, .similar-title { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
.player-box { width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; }
.player-box iframe { width: 100%; height: 50vh; border: none; }
.player-controls { padding: 12px; display: flex; justify-content: center; gap: 10px; background: #1a1a1a; flex-wrap: wrap; }
.player-controls button { padding: 8px 16px; border-radius: 30px; font-size: 12px; cursor: pointer; border: none; color: white; }
.close-btn { background: #ef4444; }
.save-btn { background: #f59e0b; }
.reset-btn { background: #ef4444; }
.saved-info { text-align: center; margin-top: 8px; min-height: 30px; padding: 0 15px 15px; font-size: 12px; }

.loading { text-align: center; padding: 40px; font-size: 14px; color: #c084fc; }
#tornaSu {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 20px;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
}

@media (min-width: 769px) {
    .topbar { padding: 20px 30px; }
    h1 { font-size: 28px; }
    .back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn { padding: 10px 20px; font-size: 14px; }
    .container { padding: 30px; margin: 40px auto; }
    .movie-details { padding: 30px; margin-bottom: 40px; border-radius: 20px; }
    .movie-header { flex-direction: row; align-items: flex-start; text-align: left; gap: 30px; }
    .movie-poster img { width: 300px; border-radius: 15px; }
    .movie-title { font-size: 32px; }
    .movie-meta { justify-content: flex-start; gap: 20px; font-size: 14px; }
    .rating { font-size: 18px; }
    .overview { font-size: 16px; }
    .genres { justify-content: flex-start; }
    .watch-buttons { justify-content: flex-start; }
    .watch-btn, .list-toggle-btn { padding: 12px 30px; font-size: 16px; }
    .info-section, .collection-section, .similar-section, .cast-section { padding: 30px; margin-top: 30px; border-radius: 20px; }
    .section-title { font-size: 24px; }
    .info-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .cast-grid, .collection-grid, .similar-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
    .cast-photo { height: 150px; }
    .collection-poster, .similar-poster { height: 225px; }
    .player-box { width: 90%; max-width: 1100px; height: auto; border-radius: 15px; }
    .player-box iframe { height: 60vh; min-height: 400px; }
    #tornaSu { bottom: 30px; right: 30px; width: 50px; height: 50px; font-size: 24px; }
    #tornaSu:hover { transform: translateY(-5px); }
}

@media (min-width: 769px) and (max-width: 1024px) {
    .cast-grid, .collection-grid, .similar-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="actors-nav-btn" onclick="goToActors()">🎭 Troupe</button>
    </div>
    <div class="topbar-center">
        <h1 onclick="goHome()" style="cursor: pointer;">🎬 KitsuStream</h1>

    <div class="topbar-right">
        <button class="list-btn" onclick="goToList()">❤️</button>

</div>

<!-- Modale Login/Registrazione -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginPanel">
            <h2>🔐 Accedi</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Accedi</button>
            <button class="login-btn" onclick="showRegisterPanel()">Registrati</button>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="registerPanel" style="display:none;">
            <h2>📝 Registrati</h2>
            <input type="text" id="regUsername" placeholder="Nome utente" autocomplete="off">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Password (min 6)">
            <button onclick="register()">Registrati</button>
            <button onclick="showLoginPanel()">Torna al Login</button>

        <div class="loading">Caricamento...</div>

<!-- PLAYER -->

        <iframe id="videoFrame" allowfullscreen></iframe>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyCeM7KVc9lZsdd8HM5b-PAfhx0usN8Aubo",
        authDomain: "kitsustream-454e8.firebaseapp.com",
        projectId: "kitsustream-454e8",
        storageBucket: "kitsustream-454e8.firebasestorage.app",
        messagingSenderId: "1008216243036",
        appId: "1:1008216243036:web:73dfb15639862757b0df99"
    };

    import { initializeApp } from 'firebase/app';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, getDoc, setDoc } from 'firebase/firestore';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userList = [];
    let currentUsername = "";

    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        
        try {
            await signInWithEmailAndPassword(auth, email, password);
            document.getElementById('authModal').style.display = 'none';
            errorDiv.textContent = '';
        } catch (error) {
            let msg = error.code === 'auth/invalid-email' ? 'Email non valida' :
                      error.code === 'auth/user-not-found' ? 'Utente non trovato' :
                      error.code === 'auth/wrong-password' ? 'Password errata' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.register = async function() {
        const username = document.getElementById('regUsername')?.value?.trim() || "";
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const errorDiv = document.getElementById('regError');
        const successDiv = document.getElementById('regSuccess');
        
        if (!username) {
            errorDiv.textContent = 'Inserisci un nome utente';
            return;
        }
        
        if (username.length < 3) {
            errorDiv.textContent = 'Il nome utente deve avere almeno 3 caratteri';
            return;
        }
        
        if (password.length < 6) {
            errorDiv.textContent = 'La password deve essere almeno di 6 caratteri';
            return;
        }
        
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            
            await setDoc(doc(db, 'users', userCredential.user.uid), { 
                list: [],
                username: username,
                email: email,
                createdAt: new Date()
            });
            
            successDiv.textContent = '✅ Registrazione completata! Ora puoi accedere.';
            setTimeout(() => window.showLoginPanel(), 2000);
        } catch (error) {
            let msg = error.code === 'auth/email-already-in-use' ? 'Email già registrata' :
                      error.code === 'auth/invalid-email' ? 'Email non valida' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.logout = async function() {
        await signOut(auth);
    };

    window.showLoginPanel = function() {
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('registerPanel').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
        document.getElementById('regUsername').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
    };

    window.showRegisterPanel = function() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('registerPanel').style.display = 'block';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    };

    window.openLoginModal = function() {
        window.showLoginPanel();
        document.getElementById('authModal').style.display = 'flex';
    };

    async function loadUserList() {
        if (!currentUser) return [];
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        return userDoc.exists() ? (userDoc.data().list || []) : [];
    }

    async function loadUserData() {
        if (!currentUser) return null;
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        return userDoc.exists() ? userDoc.data() : null;
    }

    async function saveUserList(list) {
        if (!currentUser) return;
        await setDoc(doc(db, 'users', currentUser.uid), { list: list }, { merge: true });
    }

    async function toggleCloudList(itemData) {
        if (!currentUser) {
            window.openLoginModal();
            return false;
        }
        
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        let currentList = userDoc.exists() ? (userDoc.data().list || []) : [];
        
        const exists = currentList.some(item => item.id === itemData.id && item.type === itemData.type);
        
        let newList;
        if (exists) {
            newList = currentList.filter(item => !(item.id === itemData.id && item.type === itemData.type));
        } else {
            newList = [...currentList, itemData];
        }
        
        await setDoc(doc(db, 'users', currentUser.uid), { list: newList }, { merge: true });
        
        userList = newList;
        
        return !exists;
    }

    function updateButtonState() {
        if (!window.movieData) return;
        
        const inList = userList.some(item => item.id === window.movieData.id && item.type === "movie");
        const btn = document.getElementById("listBtn");
        if (btn) {
            btn.innerHTML = inList ? "❌ Rimuovi" : "❤️ Aggiungi";
            btn.style.background = inList ? "#ef4444" : "#7c3aed";
        }
    }

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const authButtons = document.getElementById('authButtons');
        
        if (user) {
            const userData = await loadUserData();
            currentUsername = userData?.username || user.email.split('@')[0];
            
            authButtons.innerHTML = `
                <div class="user-info">
                    <span>👤</span>
                    <span class="username">${escapeHtml(currentUsername)}</span>
                    <button class="logout-btn" onclick="window.logout()" style="padding: 4px 10px;">🚪</button>
                </div>
            `;
            
            const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
            userList = userDoc.exists() ? (userDoc.data().list || []) : [];
            
            if (window.movieData) {
                updateButtonState();
            }
        } else {
            authButtons.innerHTML = `<button class="login-btn" onclick="window.openLoginModal()">🔐 Accedi</button>`;
            currentUsername = "";
            userList = [];
            if (window.movieData) {
                const btn = document.getElementById("listBtn");
                if (btn) {
                    btn.innerHTML = "❤️ Aggiungi";
                    btn.style.background = "#7c3aed";
                }
            }
        }
    });

    window.toggleCloudList = toggleCloudList;
    
    function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }
</script>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";
const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

let movieId = null;
let movieData = null;
let currentVideoUrl = "";

function getMovieIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

async function loadMovieDetails() {
    movieId = getMovieIdFromURL();
    
    if (!movieId) {
        document.getElementById("movieDetails").innerHTML = '<div class="loading">❌ ID film non valido</div>';
        return;
    }
    
    try {
        document.getElementById("movieDetails").innerHTML = '<div class="loading">⏳ Caricamento...</div>';
        
        const response = await fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=it-IT&append_to_response=credits,similar,release_dates`);
        const data = await response.json();
        movieData = data;
        window.movieData = data;
        
        const container = document.getElementById("movieDetails");
        container.innerHTML = '';
        
        await displayMovieDetails(data);
        loadAdditionalInfo(data);
        await loadCollection(data);
        loadSimilar(data.similar);
        loadCast(data.credits);
        
        // Aggiorna il bottone se la lista è già caricata
        if (typeof updateButtonState === 'function') {
            updateButtonState();
        }
        
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("movieDetails").innerHTML = '<div class="loading">❌ Errore nel caricamento</div>';
    }
}

async function displayMovieDetails(movie) {
    const posterUrl = movie.poster_path ? IMG_BASE + movie.poster_path : "https://via.placeholder.com/300x450?text=No+Image";
    const backdropUrl = movie.backdrop_path ? BACKDROP_BASE + movie.backdrop_path : "";
    
    const inList = userList.some(item => item.id === movie.id && item.type === "movie");
    const link = `https://vixsrc.to/movie/${movie.id}?lang=it`;
    
    const html = `
        <div class="movie-header">
            <div class="movie-poster">
                <img src="${posterUrl}" alt="${movie.title}" loading="lazy">
            </div>
            <div class="movie-info">
                <h2 class="movie-title">${escapeHtml(movie.title)}</h2>
                <div class="movie-meta">
                    <span>📅 ${movie.release_date ? movie.release_date.split("-")[0] : "N/D"}</span>
                    <span>⭐ <span class="rating">${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}/10</span></span>
                    <span>⏱️ ${movie.runtime ? movie.runtime + " min" : "N/D"}</span>
                    <span>🎬 ${movie.status || "N/D"}</span>
                </div>
                <div class="genres">
                    ${movie.genres ? movie.genres.map(g => `<span class="genre-tag">${g.name}</span>`).join("") : ""}
                </div>
                <div class="overview">
                    <strong>Trama:</strong><br>
                    ${movie.overview || "Trama non disponibile."}
                </div>
                <div class="watch-buttons">
                    <button class="watch-btn" onclick="openPlayer('${link}')">▶ Guarda</button>
                    <button class="list-toggle-btn" id="listBtn" onclick="toggleListFromDetails()">
                        ${inList ? "❌ Rimuovi" : "❤️ Aggiungi"}
                    </button>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").innerHTML = html;
    
    if (backdropUrl && window.innerWidth > 768) {
        document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url(${backdropUrl})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundAttachment = "fixed";
    }
}

function loadAdditionalInfo(movie) {
    const infoHtml = `
        <div class="info-section">
            <h3 class="section-title">ℹ️ Informazioni</h3>
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Titolo originale</div>
                    <div class="info-value">${escapeHtml(movie.original_title || "N/D")}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Budget</div>
                    <div class="info-value">${movie.budget ? "💰 $" + movie.budget.toLocaleString() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Incassi</div>
                    <div class="info-value">${movie.revenue ? "💵 $" + movie.revenue.toLocaleString() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Popolarità</div>
                    <div class="info-value">${movie.popularity ? "📊 " + Math.round(movie.popularity) : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Lingua originale</div>
                    <div class="info-value">${movie.original_language ? movie.original_language.toUpperCase() : "N/D"}</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Produzione</div>
                    <div class="info-value">${movie.production_companies && movie.production_companies[0] ? movie.production_companies[0].name : "N/D"}</div>
                </div>
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", infoHtml);
}

async function loadCollection(movie) {
    if (movie.belongs_to_collection && movie.belongs_to_collection.id) {
        try {
            const response = await fetch(`https://api.themoviedb.org/3/collection/${movie.belongs_to_collection.id}?api_key=${API_KEY}&language=it-IT`);
            const collectionData = await response.json();
            
            if (collectionData.parts && collectionData.parts.length > 1) {
                const otherMovies = collectionData.parts.filter(m => m.id != movie.id);
                if (otherMovies.length > 0) {
                    displayCollection(otherMovies, collectionData.name);
                }
            }
        } catch (error) {
            console.error("Errore nel caricamento della collezione:", error);
        }
    }
}

function displayCollection(movies, collectionName) {
    const sortedMovies = [...movies].sort((a, b) => {
        const dateA = a.release_date ? new Date(a.release_date) : new Date(0);
        const dateB = b.release_date ? new Date(b.release_date) : new Date(0);
        return dateA - dateB;
    });
    
    const collectionHtml = `
        <div class="collection-section">
            <h3 class="section-title">📀 ${escapeHtml(collectionName)}</h3>
            <div class="collection-grid">
                ${sortedMovies.map(movie => `
                    <div class="collection-card" onclick="openMoviePage(${movie.id})">
                        <img class="collection-poster" src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/150x225?text=No+Poster'}" alt="${movie.title}" loading="lazy">
                        <div class="collection-info">
                            <div class="collection-title">${escapeHtml(movie.title)}</div>
                            <div class="collection-year">${movie.release_date ? movie.release_date.split("-")[0] : "N/D"} | ⭐ ${movie.vote_average ? movie.vote_average.toFixed(1) : "N/A"}</div>
                        </div>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
    
    document.getElementById("movieDetails").insertAdjacentHTML("beforeend", collectionHtml);
}

// Funzioni player
function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function parseTimeInput(input) {
    input = input.trim().replace(',', '.');
    if (input.includes(':') && input.split(':').length === 3) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]), minuti = parseInt(parts[1]), secondi = parseInt(parts[2]);
        if (!isNaN(ore) && !isNaN(minuti) && !isNaN(secondi) && ore >= 0 && minuti >= 0 && minuti < 60 && secondi >= 0 && secondi < 60)
            return { success: true, seconds: (ore * 3600) + (minuti * 60) + secondi };
    }
    else if (input.includes(':') && input.split(':').length === 2) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]), minuti = parseInt(parts[1]);
        if (!isNaN(ore) && !isNaN(minuti) && ore >= 0 && minuti >= 0 && minuti < 60)
            return { success: true, seconds: (ore * 3600) + (minuti * 60) };
    }
    else {
        let minuti = parseFloat(input);
        if (!isNaN(minuti) && minuti >= 0)
            return { success: true, seconds: Math.floor(minuti * 60) };
    }
    return { success: false, seconds: 0 };
}

function saveCurrentSpot() {
    if (!currentVideoUrl) { alert("⚠️ Apri prima un video!"); return; }
    const helpText = "Formati supportati:\n\n• Minuti: 15.30\n• Ore:Minuti: 1:30\n• Ore:Minuti:Secondi: 1:30:15";
    const input = prompt("A che punto sei?\n\n" + helpText);
    if (input === null) return;
    const result = parseTimeInput(input);
    if (!result.success) { alert("❌ Formato non valido!"); return; }
    localStorage.setItem(`time_movie_${currentVideoUrl}`, result.seconds);
    const savedInfo = document.getElementById("savedInfo");
    savedInfo.innerHTML = `✅ Salvato! Riprenderò da ${formatTime(result.seconds)}`;
    savedInfo.style.color = "#4ade80";
    setTimeout(() => {
        if (document.getElementById("playerModal").style.display === "flex") {
            savedInfo.innerHTML = `📌 Posizione salvata: ${formatTime(result.seconds)}`;
            savedInfo.style.color = "#f59e0b";
        }
    }, 3000);
}

function resetSavedSpot() {
    if (!currentVideoUrl) { alert("⚠️ Apri prima un video!"); return; }
    if (!localStorage.getItem(`time_movie_${currentVideoUrl}`)) { alert("⚠️ Nessun salvataggio trovato!"); return; }
    if (confirm("Cancellare la posizione salvata?")) {
        localStorage.removeItem(`time_movie_${currentVideoUrl}`);
        const savedInfo = document.getElementById("savedInfo");
        savedInfo.innerHTML = `🗑 Salvataggio rimosso!`;
        savedInfo.style.color = "#ef4444";
    }
}

function openPlayer(url) {
    const modal = document.getElementById("playerModal");
    const frame = document.getElementById("videoFrame");
    currentVideoUrl = url;
    const savedTime = localStorage.getItem(`time_movie_${url}`);
    let finalUrl = url;
    if (savedTime && parseInt(savedTime) > 0) finalUrl += `&startAt=${parseInt(savedTime)}`;
    frame.src = finalUrl;
    modal.style.display = "flex";
}

function closePlayer() {
    const frame = document.getElementById("videoFrame");
    frame.src = "";
    document.getElementById("playerModal").style.display = "none";
    currentVideoUrl = "";
    if (document.fullscreenElement) document.exitFullscreen();
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function goBack() { window.history.back(); }
function goHome() { window.location.href = "index.html"; }

function escapeHtml(text) { 
    if (!text) return ""; 
    const div = document.createElement("div"); 
    div.textContent = text; 
    return div.innerHTML; 
}
