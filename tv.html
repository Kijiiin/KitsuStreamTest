<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: white;
    min-height: 100vh;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
}

.topbar-left, .topbar-right { display: flex; gap: 8px; align-items: center; }
.topbar-center { flex: 1; text-align: center; }

h1 {
    margin: 0;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(90deg, #a855f7, #00d4ff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn {
    background: rgba(124, 58, 237, 0.9);
    border: none;
    padding: 6px 12px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.2s ease;
}

.actors-nav-btn { background: rgba(236, 72, 153, 0.9); }
.login-btn { background: rgba(16, 185, 129, 0.9); }
.logout-btn { background: rgba(239, 68, 68, 0.9); }
.user-info { 
    font-size: 12px; 
    background: rgba(0,0,0,0.5); 
    padding: 4px 12px; 
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.username { font-weight: bold; color: #c084fc; }

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e1b4b;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    width: 90%;
    text-align: center;
}

.modal-content input {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #2d2a5e;
    color: white;
}

.modal-content button { margin: 5px; padding: 10px 20px; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 10px; }
.success-msg { color: #4ade80; font-size: 12px; margin-top: 10px; }

.container { max-width: 1200px; margin: auto; padding: 16px; }

.tv-details {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.tv-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 20px;
}

.tv-poster { flex-shrink: 0; }
.tv-poster img { width: 180px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.tv-info { flex: 1; }
.tv-title { font-size: 24px; margin-bottom: 8px; color: #c084fc; }
.tv-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 12px 0; color: #aaa; font-size: 11px; }
.rating { color: #ffd700; font-size: 14px; }
.overview { margin: 16px 0; line-height: 1.5; color: #ddd; font-size: 13px; text-align: left; }
.genres { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 16px 0; }
.genre-tag { background: rgba(124, 58, 237, 0.3); padding: 4px 12px; border-radius: 20px; font-size: 11px; }
.watch-buttons { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
.watch-btn, .list-toggle-btn, .reset-progress-btn { 
    padding: 10px 20px; 
    border: none; 
    border-radius: 30px; 
    font-size: 14px; 
    font-weight: 600; 
    cursor: pointer; 
}
.watch-btn { background: #ef4444; color: white; }
.list-toggle-btn { background: #7c3aed; color: white; }
.reset-progress-btn { background: #555; color: white; font-size: 12px; }

.info-section, .collection-section, .seasons-section, .episodes-section, .similar-section, .cast-section {
    background: rgba(31, 27, 58, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
}
.section-title { font-size: 18px; margin-bottom: 16px; color: #c084fc; }
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.info-card { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; }
.info-label { font-size: 10px; color: #888; margin-bottom: 4px; }
.info-value { font-size: 12px; font-weight: bold; color: #c084fc; }

.cast-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.cast-card { 
    background: rgba(0,0,0,0.3); 
    border-radius: 10px; 
    padding: 10px; 
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
}
.cast-card:hover {
    background: rgba(124, 58, 237, 0.5);
    transform: translateY(-3px);
}
.cast-photo { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
.cast-name { font-size: 12px; font-weight: bold; }
.cast-character { font-size: 10px; color: #aaa; }

.collection-grid, .similar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.collection-card, .similar-card { background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; cursor: pointer; }
.collection-poster, .similar-poster { width: 100%; height: 160px; object-fit: cover; }
.collection-info, .similar-info { padding: 8px; }
.collection-title, .similar-title { font-size: 11px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.seasons-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.season-card { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; }
.season-poster { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
.season-number { font-size: 14px; font-weight: bold; margin: 8px 0 4px; }

.episodes-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.episode-card { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; }
.episode-name { font-size: 14px; font-weight: bold; margin-bottom: 6px; }
.episode-overview { font-size: 11px; color: #aaa; margin-bottom: 8px; }
.play-episode-btn { padding: 8px 12px; background: #ef4444; border: none; border-radius: 20px; color: white; cursor: pointer; font-size: 11px; margin-top: 8px; width: 100%; }

.player-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
.player-box { width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; }
.player-box iframe { width: 100%; height: 50vh; border: none; }
.player-controls { padding: 12px; display: flex; justify-content: center; gap: 10px; background: #1a1a1a; flex-wrap: wrap; }
.player-controls button { padding: 8px 16px; border-radius: 30px; font-size: 12px; cursor: pointer; border: none; color: white; }
.close-btn { background: #ef4444; }
.save-btn { background: #f59e0b; }
.reset-btn { background: #ef4444; }
.saved-info { text-align: center; margin-top: 8px; min-height: 30px; padding: 0 15px 15px; font-size: 12px; }

.loading { text-align: center; padding: 40px; font-size: 14px; color: #c084fc; }
#tornaSu {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    font-size: 20px;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9998;
}

@media (min-width: 769px) {
    .topbar { padding: 20px 30px; }
    h1 { font-size: 28px; }
    .back-btn, .list-btn, .login-btn, .logout-btn, .actors-nav-btn { padding: 10px 20px; font-size: 14px; }
    .container { padding: 30px; margin: 40px auto; }
    .tv-details { padding: 30px; margin-bottom: 40px; border-radius: 20px; }
    .tv-header { flex-direction: row; align-items: flex-start; text-align: left; gap: 30px; }
    .tv-poster img { width: 300px; border-radius: 15px; }
    .tv-title { font-size: 32px; }
    .tv-meta { justify-content: flex-start; gap: 20px; font-size: 14px; }
    .rating { font-size: 18px; }
    .overview { font-size: 16px; }
    .genres { justify-content: flex-start; }
    .watch-buttons { justify-content: flex-start; }
    .watch-btn, .list-toggle-btn, .reset-progress-btn { padding: 12px 30px; font-size: 16px; }
    .reset-progress-btn { font-size: 14px; }
    .info-section, .collection-section, .seasons-section, .episodes-section, .similar-section, .cast-section { padding: 30px; margin-top: 30px; border-radius: 20px; }
    .section-title { font-size: 24px; }
    .info-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .cast-grid, .collection-grid, .similar-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
    .cast-photo { height: 150px; }
    .collection-poster, .similar-poster { height: 225px; }
    .seasons-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .episodes-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .player-box { width: 90%; max-width: 1100px; height: auto; border-radius: 15px; }
    .player-box iframe { height: 60vh; min-height: 400px; }
    #tornaSu { bottom: 30px; right: 30px; width: 50px; height: 50px; font-size: 24px; }
    #tornaSu:hover { transform: translateY(-5px); }
}

@media (min-width: 769px) and (max-width: 1024px) {
    .cast-grid, .collection-grid, .similar-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="actors-nav-btn" onclick="goToActors()">🎭 Troupe</button>
    </div>
    <div class="topbar-center">
        <h1 onclick="goHome()" style="cursor: pointer;">🎬 KitsuStream</h1>
    </div>
    <div class="topbar-right">
        <div id="authButtons"></div>
        <button class="list-btn" onclick="goToList()">❤️</button>
    </div>
</div>

<!-- Modale Login/Registrazione -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <div id="loginPanel">
            <h2>🔐 Accedi</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button onclick="login()">Accedi</button>
            <button class="login-btn" onclick="showRegisterPanel()">Registrati</button>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="registerPanel" style="display:none;">
            <h2>📝 Registrati</h2>
            <input type="text" id="regUsername" placeholder="Nome utente" autocomplete="off">
            <input type="email" id="regEmail" placeholder="Email">

            <div id="regSuccess" class="success-msg"></div>
        </div>

</div>

<div class="container">
    <div id="tvDetails" class="tv-details">
        <div class="loading">Caricamento...</div>
    </div>
</div>

<!-- PLAYER -->
<div id="playerModal" class="player-modal" onclick="handleOutsideClick(event)">

        <iframe id="videoFrame" allowfullscreen></iframe>
        <div class="player-controls">
            <button class="save-btn" onclick="saveCurrentSpot()">💾 Salva posizione</button>
            <button class="reset-btn" onclick="resetSavedSpot()">🗑 Reset</button>
            <button class="close-btn" onclick="closePlayer()">❌ Chiudi</button>
        </div>
        <div id="savedInfo" class="saved-info"></div>
    </div>
</div>

<button id="tornaSu" title="Torna su">↑</button>

<script type="module">
    const firebaseConfig = {
        apiKey: "AIzaSyCeM7KVc9lZsdd8HM5b-PAfhx0usN8Aubo",
        authDomain: "kitsustream-454e8.firebaseapp.com",
        projectId: "kitsustream-454e8",
        storageBucket: "kitsustream-454e8.firebasestorage.app",
        messagingSenderId: "1008216243036",
        appId: "1:1008216243036:web:73dfb15639862757b0df99"
    };

    import { initializeApp } from 'firebase/app';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from 'firebase/firestore';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userList = [];
    let currentUsername = "";
    
    // Funzione globale per aggiornare il bottone
    window.updateTVButton = function() {
        if (!window.tvData) return;
        const btn = document.getElementById("listBtn");
        if (btn) {
            const inList = userList.some(item => item.id === window.tvData.id && item.type === "tv");
            btn.innerHTML = inList ? "❌ Rimuovi" : "❤️ Aggiungi";
            btn.style.background = inList ? "#ef4444" : "#7c3aed";
        }
    };

    // ========== FUNZIONI PER IL SALVATAGGIO DEL PROGRESSO SERIE TV NEL CLOUD ==========
    window.saveTVProgressCloud = async function(seasonNum, episodeNum) {
        if (!currentUser) return;
        if (!window.tvData) return;
        try {
            const progressRef = doc(db, 'users', currentUser.uid, 'progress', 'tv_' + window.tvData.id);
            await setDoc(progressRef, {
                lastSeason: seasonNum,
                lastEpisode: episodeNum,
                timestamp: Date.now(),
                title: window.tvData.name,
                type: "tv"
            }, { merge: true });
            console.log("Progresso TV salvato nel cloud:", seasonNum, episodeNum);
        } catch (error) {
            console.error("Errore salvataggio cloud:", error);
        }
    };

    window.loadTVProgressCloud = async function() {
        if (!currentUser) return null;
        if (!window.tvData) return null;
        try {
            const progressRef = doc(db, 'users', currentUser.uid, 'progress', 'tv_' + window.tvData.id);
            const docSnap = await getDoc(progressRef);
            if (docSnap.exists()) {
                return {
                    lastSeason: docSnap.data().lastSeason,
                    lastEpisode: docSnap.data().lastEpisode
                };
            }
        } catch (error) {
            console.error("Errore caricamento cloud:", error);
        }
        return null;
    };

    window.resetTVProgressCloud = async function() {
        if (!currentUser) return;
        if (!window.tvData) return;
        try {
            const progressRef = doc(db, 'users', currentUser.uid, 'progress', 'tv_' + window.tvData.id);
            await deleteDoc(progressRef);
            console.log("Progresso serie TV cloud rimosso");
        } catch (error) {
            console.error("Errore reset cloud:", error);
        }
    };
    // =======================================================================

    window.login = async function() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        try {
            await signInWithEmailAndPassword(auth, email, password);
            document.getElementById('authModal').style.display = 'none';
            errorDiv.textContent = '';
        } catch (error) {
            let msg = error.code === 'auth/invalid-email' ? 'Email non valida' :
                      error.code === 'auth/user-not-found' ? 'Utente non trovato' :
                      error.code === 'auth/wrong-password' ? 'Password errata' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.register = async function() {
        const username = document.getElementById('regUsername')?.value?.trim() || "";
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const errorDiv = document.getElementById('regError');
        const successDiv = document.getElementById('regSuccess');
        if (!username) {
            errorDiv.textContent = 'Inserisci un nome utente';
            return;
        }
        if (username.length < 3) {
            errorDiv.textContent = 'Il nome utente deve avere almeno 3 caratteri';
            return;
        }
        if (password.length < 6) {
            errorDiv.textContent = 'La password deve essere almeno di 6 caratteri';
            return;
        }
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, 'users', userCredential.user.uid), { 
                list: [],
                username: username,
                email: email,
                createdAt: new Date()
            });
            successDiv.textContent = '✅ Registrazione completata! Ora puoi accedere.';
            setTimeout(() => window.showLoginPanel(), 2000);
        } catch (error) {
            let msg = error.code === 'auth/email-already-in-use' ? 'Email già registrata' :
                      error.code === 'auth/invalid-email' ? 'Email non valida' : error.message;
            errorDiv.textContent = msg;
        }
    };

    window.logout = async function() {
        await signOut(auth);
        window.location.href = "index.html";
    };

    window.showLoginPanel = function() {
        document.getElementById('loginPanel').style.display = 'block';
        document.getElementById('registerPanel').style.display = 'none';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
        document.getElementById('regUsername').value = '';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
    };

    window.showRegisterPanel = function() {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('registerPanel').style.display = 'block';
        document.getElementById('loginError').textContent = '';
        document.getElementById('regError').textContent = '';
        document.getElementById('regSuccess').textContent = '';
    };

    window.openLoginModal = function() {
        window.showLoginPanel();
        document.getElementById('authModal').style.display = 'flex';
    };

    async function loadUserData() {
        if (!currentUser) return null;
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        return userDoc.exists() ? userDoc.data() : null;
    }

    async function loadUserList() {
        if (!currentUser) return [];
        const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
        return userDoc.exists() ? (userDoc.data().list || []) : [];
    }

    async function toggleCloudList(itemData) {
        if (!currentUser) {
            window.openLoginModal();
            return false;
        }
        const currentList = await loadUserList();
        const exists = currentList.some(item => item.id === itemData.id && item.type === itemData.type);
        let newList = exists ? currentList.filter(item => !(item.id === itemData.id && item.type === itemData.type)) : [...currentList, itemData];
        await setDoc(doc(db, 'users', currentUser.uid), { list: newList }, { merge: true });
        userList = newList;
        if (window.updateTVButton) window.updateTVButton();
        return !exists;
    }

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const authButtons = document.getElementById('authButtons');
        if (user) {
            const userData = await loadUserData();
            currentUsername = userData?.username || user.email.split('@')[0];
            authButtons.innerHTML = `
                <div class="user-info">
                    <span>👤</span>
                    <span class="username">${escapeHtml(currentUsername)}</span>
                    <button class="logout-btn" onclick="window.logout()" style="padding: 4px 10px;">🚪</button>
                </div>
            `;
            userList = await loadUserList();
            if (window.updateTVButton) window.updateTVButton();
        } else {
            authButtons.innerHTML = `<button class="login-btn" onclick="window.openLoginModal()">🔐 Accedi</button>`;
            currentUsername = "";
            userList = [];
            if (window.tvData && document.getElementById("listBtn")) {
                const btn = document.getElementById("listBtn");
                btn.innerHTML = "❤️ Aggiungi";
                btn.style.background = "#7c3aed";
            }
        }
    });

    window.toggleCloudList = toggleCloudList;
    window.getCurrentUser = () => currentUser;
    window.loadUserList = loadUserList;
    
    function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }
</script>

<script>
const API_KEY = "7fe396e6f50677047459e8c173f2bd9d";
const IMG_BASE = "https://image.tmdb.org/t/p/w500";
const BACKDROP_BASE = "https://image.tmdb.org/t/p/original";

let tvId = null;
let tvData = null;
let selectedSeason = 1;
let currentVideoUrl = "";

function getTVIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
}

// ========== FUNZIONI PER IL SALVATAGGIO DEL PROGRESSO EPISODI ==========
async function saveSeriesProgress(seasonNum, episodeNum) {
    if (!tvData) return;
    const key = `series_progress_${tvData.id}`;
    localStorage.setItem(key, JSON.stringify({
        lastSeason: seasonNum,
        lastEpisode: episodeNum,
        timestamp: Date.now(),
        title: tvData.name
    }));
    if (window.saveTVProgressCloud) {
        await window.saveTVProgressCloud(seasonNum, episodeNum);
    }
}

async function loadSeriesProgress() {
    if (!tvData) return null;
    if (window.loadTVProgressCloud) {
        const cloudProgress = await window.loadTVProgressCloud();
        if (cloudProgress && cloudProgress.lastSeason) {
            return cloudProgress;
        }
    }
    const key = `series_progress_${tvData.id}`;
    const saved = localStorage.getItem(key);
    if (saved) {
        try { return JSON.parse(saved); } catch(e) { return null; }
    }
    return null;
}

async function getNextEpisode() {
    const progress = await loadSeriesProgress();
    if (!progress) return { season: 1, episode: 1 };
    let nextSeason = progress.lastSeason;
    let nextEpisode = progress.lastEpisode + 1;
    const currentSeasonData = tvData.seasons?.find(s => s.season_number === nextSeason);
    const maxEpisodes = currentSeasonData?.episode_count || 0;
    if (nextEpisode > maxEpisodes && maxEpisodes > 0) {
        nextSeason++;
        nextEpisode = 1;
        const nextSeasonData = tvData.seasons?.find(s => s.season_number === nextSeason);
        if (!nextSeasonData || nextSeasonData.episode_count === 0) {
            nextSeason = progress.lastSeason;
            nextEpisode = progress.lastEpisode;
        }
    }
    return { season: nextSeason, episode: nextEpisode };
}

async function resetSeriesProgress() {
    if (!tvData) return;
    if (confirm(`Resettare il progresso per "${tvData.name}"? Ricomincerai dall'episodio 1.`)) {
        if (window.resetTVProgressCloud) await window.resetTVProgressCloud();
        const key = `series_progress_${tvData.id}`;
        localStorage.removeItem(key);
        await updateResumeButton();
        alert("Progresso resettato!");
    }
}

async function updateResumeButton() {
    const watchBtn = document.getElementById("watchBtn");
    if (!watchBtn) return;
    const progress = await loadSeriesProgress();
    const nextEpisode = await getNextEpisode();
    if (progress) {
        watchBtn.innerHTML = `▶ Riprendi S${nextEpisode.season}E${nextEpisode.episode}`;
        watchBtn.style.background = "#f59e0b";
        watchBtn.onclick = () => playEpisode(nextEpisode.season, nextEpisode.episode);
    } else {
        watchBtn.innerHTML = "▶ Guarda";
        watchBtn.style.background = "#ef4444";
        watchBtn.onclick = () => playFirstEpisode();
    }
}

        return;
    }
    try {
        document.getElementById("tvDetails").innerHTML = '<div class="loading">⏳ Caricamento...</div>';
        const response = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${API_KEY}&language=it-IT&append_to_response=credits,similar`);
        const data = await response.json();
        tvData = data;
        window.tvData = data;
        const container = document.getElementById("tvDetails");
        container.innerHTML = '';
        await displayTVDetails(data);
        loadAdditionalInfo(data);
        await loadCollection(data);
        loadSeasons(data.seasons);
        loadEpisodes(1);
        loadSimilar(data.similar);
        loadCast(data.credits);

        await updateResumeButton();
    } catch (error) {
        console.error("Errore:", error);
        document.getElementById("tvDetails").innerHTML = '<div class="loading">❌ Errore nel caricamento</div>';
    }
}

async function loadCollection(tv) {
    if (tv.belongs_to_collection && tv.belongs_to_collection.id) {
        try {
            const response = await fetch(`https://api.themoviedb.org/3/collection/${tv.belongs_to_collection.id}?api_key=${API_KEY}&language=it-IT`);
            const collectionData = await response.json();
            if (collectionData.parts && collectionData.parts.length > 1) {
                const otherShows = collectionData.parts.filter(show => show.id != tv.id);
                if (otherShows.length > 0) {
                    displayCollection(otherShows, collectionData.name);
                }
            }
        } catch (error) {
            console.error("Errore nel caricamento della collezione:", error);
        }
    }
}

function displayCollection(shows, collectionName) {
    const sortedShows = [...shows].sort((a, b) => {
        const dateA = a.first_air_date ? new Date(a.first_air_date) : new Date(0);
        const dateB = b.first_air_date ? new Date(b.first_air_date) : new Date(0);
        return dateA - dateB;
    });
    const collectionHtml = `
        <div class="collection-section">
            <h3 class="section-title">📀 ${escapeHtml(collectionName)}</h3>
            <div class="collection-grid">
                ${sortedShows.map(show => `
                    <div class="collection-card" onclick="openTVPage(${show.id})">
                        <img class="collection-poster" src="${show.poster_path ? IMG_BASE + show.poster_path : 'https://via.placeholder.com/150x225?text=No+Poster'}">
                        <div class="collection-info">

                            <div class="collection-year">${show.first_air_date ? show.first_air_date.split("-")[0] : "N/D"} | ⭐ ${show.vote_average ? show.vote_average.toFixed(1) : "N/A"}</div>

function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    return `${m}:${s.toString().padStart(2, '0')}`;
}

function parseTimeInput(input) {
    input = input.trim().replace(',', '.');
    if (input.includes(':') && input.split(':').length === 3) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]), minuti = parseInt(parts[1]), secondi = parseInt(parts[2]);
        if (!isNaN(ore) && !isNaN(minuti) && !isNaN(secondi) && ore >= 0 && minuti >= 0 && minuti < 60 && secondi >= 0 && secondi < 60)
            return { success: true, seconds: (ore * 3600) + (minuti * 60) + secondi };
    }
    else if (input.includes(':') && input.split(':').length === 2) {
        const parts = input.split(':');
        const ore = parseInt(parts[0]), minuti = parseInt(parts[1]);
        if (!isNaN(ore) && !isNaN(minuti) && ore >= 0 && minuti >= 0 && minuti < 60)
            return { success: true, seconds: (ore * 3600) + (minuti * 60) };
    }
    else {
        let minuti = parseFloat(input);
        if (!isNaN(minuti) && minuti >= 0)
            return { success: true, seconds: Math.floor(minuti * 60) };
    }
    return { success: false, seconds: 0 };
}

function saveCurrentSpot() {
    if (!currentVideoUrl) { alert("⚠️ Apri prima un video!"); return; }
    const helpText = "Formati supportati:\n\n• Minuti: 15.30\n• Ore:Minuti: 1:30\n• Ore:Minuti:Secondi: 1:30:15";
    const input = prompt("A che punto sei?\n\n" + helpText);
    if (input === null) return;
    const result = parseTimeInput(input);
    if (!result.success) { alert("❌ Formato non valido!"); return; }
    localStorage.setItem(`time_tv_${currentVideoUrl}`, result.seconds);
    const savedInfo = document.getElementById("savedInfo");
    savedInfo.innerHTML = `✅ Salvato! Riprenderò da ${formatTime(result.seconds)}`;
    savedInfo.style.color = "#4ade80";
    setTimeout(() => {
        if (document.getElementById("playerModal").style.display === "flex") {
            savedInfo.innerHTML = `📌 Posizione salvata: ${formatTime(result.seconds)}`;
            savedInfo.style.color = "#f59e0b";
        }
    }, 3000);
}

function resetSavedSpot() {
    if (!currentVideoUrl) { alert("⚠️ Apri prima un video!"); return; }
    if (!localStorage.getItem(`time_tv_${currentVideoUrl}`)) { alert("⚠️ Nessun salvataggio trovato!"); return; }
    if (confirm("Cancellare la posizione salvata?")) {
        localStorage.removeItem(`time_tv_${currentVideoUrl}`);
        const savedInfo = document.getElementById("savedInfo");
        savedInfo.innerHTML = `🗑 Salvataggio rimosso!`;
        savedInfo.style.color = "#ef4444";
    }
}

function openPlayer(url) {
    const modal = document.getElementById("playerModal");
    const frame = document.getElementById("videoFrame");
    currentVideoUrl = url;
    const savedTime = localStorage.getItem(`time_tv_${url}`);
    let finalUrl = url;
    if (savedTime && parseInt(savedTime) > 0) finalUrl += `&startAt=${parseInt(savedTime)}`;
    frame.src = finalUrl;
    modal.style.display = "flex";
}

function closePlayer() {
    const frame = document.getElementById("videoFrame");
    frame.src = "";
    document.getElementById("playerModal").style.display = "none";
    currentVideoUrl = "";
    if (document.fullscreenElement) document.exitFullscreen();
}

function handleOutsideClick(e) {
    const box = document.getElementById("playerBox");
    if (!box.contains(e.target)) closePlayer();
}

function escapeHtml(text) { 
    if (!text) return ""; 
    const div = document.createElement("div"); 
    div.textContent = text; 
    return div.innerHTML; 
}
